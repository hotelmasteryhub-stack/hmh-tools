<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance Audit -- Hotel Mastery Hub</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Georgia,serif; background:#F8F5F0; min-height:100vh; color:#1A1A1A; }
.header { background:#1A1A1A; padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; }
.hb { color:#B8962E; font-size:10px; letter-spacing:4px; font-family:system-ui; font-weight:600; }
.hs { color:#8A8070; font-size:10px; letter-spacing:3px; font-family:system-ui; margin-left:16px; }
.wrap { max-width:860px; margin:0 auto; padding:32px 20px 60px; }
.title-row { display:flex; align-items:flex-start; gap:16px; margin-bottom:28px; }
.gold-bar { width:4px; background:#B8962E; align-self:stretch; min-height:52px; flex-shrink:0; }
h1 { font-size:28px; color:#1A1A1A; font-weight:700; margin-bottom:6px; }
.sub { font-size:14px; color:#8A8070; font-family:system-ui; font-style:italic; }
.btn-gold { background:#B8962E; border:none; color:#1A1A1A; padding:12px 24px; font-size:12px; font-family:system-ui; font-weight:700; letter-spacing:1px; cursor:pointer; }
.btn-gold:hover { background:#D4AF5A; }
.btn-sec { background:#fff; border:1px solid #E5DDD0; color:#8A8070; padding:10px 20px; font-size:12px; font-family:system-ui; font-weight:700; letter-spacing:1px; cursor:pointer; }
.btn-sec:disabled { opacity:0.4; cursor:not-allowed; }
label { display:block; font-size:10px; color:#8A8070; letter-spacing:2px; font-family:system-ui; font-weight:600; margin-bottom:6px; }
input[type=text] { padding:9px 12px; border:1px solid #E5DDD0; font-size:13px; font-family:system-ui; background:#FAFAFA; color:#1A1A1A; outline:none; }
input[type=text]:focus { border-color:#B8962E; }
.intro-card { background:#fff; border:1px solid #E5DDD0; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:20px; }
.section-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
.section-tab { padding:8px 14px; font-size:11px; font-family:system-ui; font-weight:600; letter-spacing:1px; cursor:pointer; border:1px solid #E5DDD0; background:#fff; color:#8A8070; }
.section-tab.active { background:#1A1A1A; color:#B8962E; border-color:#1A1A1A; }
.section-tab.done { background:#F0FFF0; color:#55AA55; border-color:#55AA55; }
.q-card { background:#fff; border:1px solid #E5DDD0; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.q-top { padding:20px 24px 0; }
.q-num { font-size:11px; color:#B8962E; font-family:system-ui; letter-spacing:2px; font-weight:600; margin-bottom:8px; }
.q-text { font-size:16px; font-weight:700; color:#1A1A1A; line-height:1.3; margin-bottom:20px; }
.options { border-top:1px solid #F0EBE3; }
.opt { padding:14px 24px; border-bottom:1px solid #F0EBE3; cursor:pointer; display:flex; align-items:center; gap:12px; background:#fff; border-left:4px solid transparent; }
.opt:hover { background:#FFFDF5; }
.opt.selected { background:#FFFDF5; border-left-color:#B8962E; }
.opt-radio { width:18px; height:18px; border:2px solid #CCC; border-radius:50%; background:transparent; flex-shrink:0; }
.opt.selected .opt-radio { border-color:#B8962E; background:#B8962E; }
.opt-label { font-size:14px; color:#1A1A1A; font-family:system-ui; }
.nav-row { display:flex; justify-content:space-between; margin-top:16px; }
.result-header { background:#1A1A1A; padding:28px 32px; margin-bottom:24px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
.result-card { background:#fff; border:1px solid #E5DDD0; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.result-section-head { padding:16px 20px; display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.score-bar-track { height:4px; background:#F0EBE3; border-radius:2px; margin:0 20px 12px; }
.score-bar-fill { height:4px; border-radius:2px; }
.result-text { padding:0 20px 16px; font-size:13px; color:#1A1A1A; font-family:system-ui; line-height:1.6; }
.answer-row { padding:10px 20px; border-top:1px solid #F0EBE3; display:flex; gap:10px; align-items:flex-start; }
.answer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.priority-box { background:#1A1A1A; border:1px solid rgba(184,150,46,0.3); padding:24px 28px; margin-bottom:24px; }
.priority-item { display:flex; gap:14px; margin-bottom:14px; align-items:flex-start; }
.priority-num { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; font-family:system-ui; color:#fff; }
.save-note { font-size:11px; color:#8A8070; font-family:system-ui; margin-top:8px; text-align:center; }
.footer-note { text-align:center; margin-top:40px; color:#8A8070; font-size:11px; font-family:system-ui; letter-spacing:2px; }
@media print { .header,.section-tabs,.nav-row,.btn-gold,.btn-sec,.save-note { display:none !important; } body { background:#fff; } .wrap { padding:10px; } }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;">
    <span class="hb">HOTEL MASTERY HUB</span>
    <span class="hs">&middot; MAINTENANCE AUDIT</span>
  </div>
</div>
<div class="wrap" id="main-wrap"></div>

<script>
const SECTIONS = [
  { id:'detection', title:'Issue Detection', icon:'Search',
    questions:[
      { id:'hk_check', text:'Does housekeeping check room condition during cleaning - beyond just cleanliness?', options:['Never / rarely','Sometimes','Yes, consistently'], scores:[0,1,2] },
      { id:'sup_inspect', text:'Does your supervisor inspect rooms and specifically look for maintenance issues?', options:['Never / rarely','Sometimes','Yes, consistently'], scores:[0,1,2] },
      { id:'guest_first', text:'How often do guests report issues before your team notices them?', options:['Very often - guests almost always find issues first','Sometimes','Rarely - we usually catch issues ourselves'], scores:[0,1,2] },
    ]
  },
  { id:'logging', title:'Recording & Logging', icon:'Log',
    questions:[
      { id:'log_exists', text:'Do you have a maintenance log that is actively used?', options:['No log exists','We have one but it is rarely used','Yes, we log issues consistently'], scores:[0,1,2] },
      { id:'log_complete', text:'When issues are logged, do they include: what, where, urgency, action, and who is responsible?', options:['No - we just write what broke','Some of this information','Yes - all five fields'], scores:[0,1,2] },
      { id:'followup', text:'How do you know when a logged issue has been resolved?', options:['We do not track this','The person responsible tells us','We update the log when it is resolved'], scores:[0,1,2] },
    ]
  },
  { id:'urgency', title:'Urgency & Response', icon:'Alert',
    questions:[
      { id:'triage', text:'When a maintenance issue is reported, does your team know how urgent it is and what to do next?', options:['No - it is unclear, we improvise','Sometimes - depends who is on shift','Yes - clear urgency levels exist'], scores:[0,1,2] },
      { id:'l3_response', text:'If a guest had no hot water right now, does every team member know exactly who to call?', options:['No - they would have to ask someone','The manager knows, but not all staff','Yes - the number is posted and everyone knows it'], scores:[0,1,2] },
      { id:'reaction_time', text:'On average, how long does it take to resolve a guest-impact issue?', options:['More than a few hours','Within 1-2 hours','Within 30-60 minutes'], scores:[0,1,2] },
    ]
  },
  { id:'prevention', title:'Prevention & Patterns', icon:'Shield',
    questions:[
      { id:'frequency', text:'Do you have daily, weekly, and monthly maintenance checks - not just reactive fixes?', options:['No scheduled checks exist','Some checks happen, but inconsistently','Yes - scheduled checks happen regularly'], scores:[0,1,2] },
      { id:'patterns', text:'Can you identify which areas or systems in your hotel break most often?', options:['No - it feels random','I have a rough idea','Yes - I know our problem areas clearly'], scores:[0,1,2] },
      { id:'repeat', text:'Do the same types of issues come up repeatedly?', options:['Yes - the same things keep breaking','Sometimes the same issues recur','Rarely - most issues are one-off'], scores:[2,1,0] },
    ]
  },
];

const RECS = {
  detection:{ low:{label:'Critical Gap',color:'#CC5555',text:'Your hotel relies on guests to find problems. Build housekeeping observation habits now - it is the single most impactful change you can make.'}, mid:{label:'Needs Work',color:'#D4903A',text:'Detection is inconsistent. Formalise what housekeeping looks for during cleaning and what supervisors check during room inspection.'}, high:{label:'Strong',color:'#55AA55',text:'Your team is observing well. Focus on ensuring what they notice gets logged and acted on consistently.'} },
  logging:{ low:{label:'Critical Gap',color:'#CC5555',text:'Without a log, issues disappear until guests find them. Start with a simple shared document - the key is that every issue gets written down.'}, mid:{label:'Needs Work',color:'#D4903A',text:'Your log exists but is not being used fully. Add the five required fields and make logging part of the shift routine.'}, high:{label:'Strong',color:'#55AA55',text:'Good logging habits. Review your log monthly to look for patterns in what keeps breaking.'} },
  urgency:{ low:{label:'Critical Gap',color:'#CC5555',text:'Your team is improvising under pressure. Define the three urgency levels now and build an escalation contact list.'}, mid:{label:'Needs Work',color:'#D4903A',text:'Urgency awareness exists in your head but not in your systems. Document the levels so any team member can respond correctly.'}, high:{label:'Strong',color:'#55AA55',text:'Good response systems. Ensure contact lists are updated and your backup contacts are current.'} },
  prevention:{ low:{label:'Critical Gap',color:'#CC5555',text:'You are fully reactive. The same issues will keep occurring until you build a scheduled check system. Start with daily observations.'}, mid:{label:'Needs Work',color:'#D4903A',text:'Some prevention exists but it is not systematic. Build a simple daily/weekly/monthly checklist tailored to your property.'}, high:{label:'Strong',color:'#55AA55',text:'Good prevention habits. Ensure your checklists stay current and your team treats them as non-negotiable.'} },
};

let currentStep = 'intro';
let propertyName = '';
let answers = {};
let activeSection = 0;

function rec(sectionId, score, max) {
  const pct = score/max;
  const tier = pct>=0.75?'high':pct>=0.4?'mid':'low';
  return {...RECS[sectionId][tier], tier, score, max};
}

function sectionComplete(idx) {
  return SECTIONS[idx].questions.every(q=>answers[q.id]!==undefined);
}

function render() {
  const wrap = document.getElementById('main-wrap');
  if(currentStep==='intro') renderIntro(wrap);
  else if(currentStep==='audit') renderAudit(wrap);
  else renderResults(wrap);
}

function renderIntro(wrap) {
  wrap.innerHTML = `
    <div class="title-row"><div class="gold-bar"></div><div><h1>Maintenance System Audit</h1><p class="sub">12 questions. 4 areas. Instant gap analysis for your hotel.</p></div></div>
    <div class="intro-card">
      <label>Property name (optional)</label>
      <input type="text" id="prop-input" placeholder="e.g. Hotel Bella Vista" value="${propertyName}" style="max-width:360px;" oninput="propertyName=this.value">
      <div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        ${SECTIONS.map(s=>`<div style="background:#F8F5F0;border:1px solid #E5DDD0;padding:14px 16px;"><div style="font-size:13px;font-weight:700;color:#1A1A1A;margin-bottom:4px;">${s.title}</div><div style="font-size:11px;color:#8A8070;font-family:system-ui;">${s.questions.length} questions</div></div>`).join('')}
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn-gold" onclick="currentStep='audit';activeSection=0;render();">START AUDIT &rarr;</button>
    </div>
    <div class="footer-note">HOTEL MASTERY HUB &middot; MAINTENANCE MASTERY TOOLKIT</div>
  `;
}

function renderAudit(wrap) {
  const section = SECTIONS[activeSection];
  const total = SECTIONS.flatMap(s=>s.questions).length;
  const answered = Object.keys(answers).length;
  wrap.innerHTML = `
    <div class="title-row"><div class="gold-bar"></div><div><h1>${section.title}</h1><p class="sub">Section ${activeSection+1} of ${SECTIONS.length} &middot; ${answered} of ${total} questions answered</p></div></div>
    <div class="section-tabs">
      ${SECTIONS.map((s,i)=>`<button class="section-tab ${i===activeSection?'active':sectionComplete(i)?'done':''}" onclick="activeSection=${i};render();">${i+1}. ${s.title}</button>`).join('')}
    </div>
    ${section.questions.map((q,qi)=>`
      <div class="q-card">
        <div class="q-top">
          <div class="q-num">QUESTION ${qi+1} OF ${section.questions.length}</div>
          <div class="q-text">${q.text}</div>
        </div>
        <div class="options">
          ${q.options.map((opt,oi)=>`
            <div class="opt ${answers[q.id]?.idx===oi?'selected':''}" onclick="setAnswer('${q.id}',${oi},${q.scores[oi]})">
              <div class="opt-radio"></div>
              <span class="opt-label">${opt}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
    <div class="nav-row">
      <button class="btn-sec" onclick="if(activeSection>0){activeSection--;render();}" ${activeSection===0?'disabled':''}&larr; Back</button>
      <button class="btn-gold" onclick="nextSection()" ${!sectionComplete(activeSection)?'disabled':''} style="${!sectionComplete(activeSection)?'background:#E5DDD0;color:#8A8070;cursor:not-allowed;':''}">${activeSection<SECTIONS.length-1?'Next Section &rarr;':'See My Results &rarr;'}</button>
    </div>
    <div class="footer-note">HOTEL MASTERY HUB &middot; MAINTENANCE MASTERY TOOLKIT</div>
  `;
}

function setAnswer(qid, idx, score) {
  answers[qid] = {idx, score};
  render();
}

function nextSection() {
  if(!sectionComplete(activeSection)) return;
  if(activeSection<SECTIONS.length-1) { activeSection++; render(); }
  else { currentStep='results'; render(); }
}

function renderResults(wrap) {
  const results = SECTIONS.map(s=>{
    const score = s.questions.reduce((sum,q)=>sum+(answers[q.id]?.score||0),0);
    const max = s.questions.length*2;
    return {section:s, score, max, rec:rec(s.id,score,max)};
  });
  const totalScore = results.reduce((s,r)=>s+r.score,0);
  const totalMax = results.reduce((s,r)=>s+r.max,0);
  const pct = Math.round((totalScore/totalMax)*100);
  const overall = pct>=75?{text:'Well Structured',color:'#55AA55'}:pct>=45?{text:'Developing',color:'#D4903A'}:{text:'Reactive - Needs Attention',color:'#CC5555'};

  wrap.innerHTML = `
    <div class="result-header">
      <div style="font-size:10px;color:#B8962E;letter-spacing:4px;font-family:system-ui;font-weight:600;margin-bottom:4px;">MAINTENANCE AUDIT RESULTS</div>
      ${propertyName?`<div style="font-size:13px;color:#8A8070;font-family:system-ui;margin-bottom:8px;">${propertyName}</div>`:''}
      <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:16px;">
        <div style="font-size:56px;font-weight:700;color:${overall.color};line-height:1;">${pct}%</div>
        <div>
          <div style="font-size:20px;color:${overall.color};font-weight:700;margin-bottom:4px;">${overall.text}</div>
          <div style="font-size:13px;color:#8A8070;font-family:system-ui;">${totalScore} of ${totalMax} points across all sections</div>
        </div>
      </div>
      <div style="height:8px;background:#2A2A2A;border-radius:4px;"><div style="height:8px;background:${overall.color};width:${pct}%;border-radius:4px;"></div></div>
    </div>

    <div style="font-size:10px;color:#8A8070;letter-spacing:3px;font-family:system-ui;font-weight:600;margin-bottom:8px;">GAP ANALYSIS BY AREA</div>
    ${results.map(({section,score,max,rec})=>`
      <div class="result-card" style="border-left:4px solid ${rec.color};">
        <div class="result-section-head">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:16px;font-weight:700;color:#1A1A1A;">${section.title}</span>
          </div>
          <div style="text-align:right;">
            <span style="font-size:11px;font-weight:700;color:${rec.color};font-family:system-ui;letter-spacing:1px;background:${rec.tier==='high'?'#F0FFF0':rec.tier==='mid'?'#FFF8F0':'#FFF0F0'};padding:3px 10px;border:1px solid ${rec.color}33;">${rec.label}</span>
            <div style="font-size:12px;color:#8A8070;font-family:system-ui;margin-top:4px;">${score}/${max} points</div>
          </div>
        </div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${(score/max)*100}%;background:${rec.color};"></div></div>
        <div class="result-text">${rec.text}</div>
        ${section.questions.map(q=>{
          const ans = answers[q.id];
          const s = ans?.score||0;
          const col = s===2?'#55AA55':s===1?'#D4903A':'#CC5555';
          return `<div class="answer-row"><div class="answer-dot" style="background:${col};"></div><div><div style="font-size:12px;color:#8A8070;font-family:system-ui;margin-bottom:2px;">${q.text}</div><div style="font-size:12px;font-weight:600;color:${col};font-family:system-ui;">${ans!==undefined?q.options[ans.idx]:'Not answered'}</div></div></div>`;
        }).join('')}
      </div>
    `).join('')}

    <div class="priority-box">
      <div style="font-size:10px;color:#B8962E;letter-spacing:3px;font-family:system-ui;font-weight:600;margin-bottom:16px;">YOUR PRIORITY ACTIONS</div>
      ${[...results].sort((a,b)=>a.score/a.max-b.score/b.max).slice(0,3).map(({section,rec},i)=>`
        <div class="priority-item">
          <div class="priority-num" style="background:${rec.color};">${i+1}</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#F5F0E8;margin-bottom:2px;">${section.title}</div>
            <div style="font-size:12px;color:#8A8070;font-family:system-ui;line-height:1.5;">${rec.text.split('.')[0]}.</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="display:flex;gap:10px;">
      <button class="btn-sec" onclick="currentStep='intro';answers={};render();">Retake Audit</button>
      <button class="btn-gold" style="flex:1;" onclick="window.print()">SAVE AS PDF</button>
    </div>
    <p class="save-note">To save as PDF, a PDF printer or "Save as PDF" option must be available on your device.</p>
    <div class="footer-note">HOTEL MASTERY HUB &middot; MAINTENANCE MASTERY TOOLKIT</div>
  `;
}

render();
</script>
</body>
</html>
