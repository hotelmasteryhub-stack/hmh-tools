class=\"btn gold\" onclick=\"showResults()\">Calculate results</button></div></section>\n<section id=\"results\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Assessment results</div><h1 id=\"resultHotel\">Hotel Operations Maturity</h1><p id=\"resultMeta\"></p></div><div class=\"toolbar no-print\"><button class=\"btn\" onclick=\"window.print()\">Print / Save PDF</button><button class=\"btn\" onclick=\"exportCSV()\">Export CSV</button><button class=\"btn gold\" onclick=\"finalizeAssessment()\">Save snapshot</button></div></div><div id=\"resultsContent\"></div></section>\n<section id=\"history\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Progress</div><h1>Historical comparison</h1></div></div><div id=\"historyContent\"></div></section>\n<section id=\"print-report\" class=\"screen\"></section>\n</main></div></div><div id=\"toast\" class=\"toast\"></div>\n<script>\nconst KEY='hmh_maturity_v1', SHARED='hmh_hotel_profile_v1';\nconst categoryMeta=[\n['daily','Daily Operations and Ownership','Mapping the Perfect Day',['Guest Journey Mapper','Hour-by-Hour Planner','Shift Planner','Room File']],\n['quality','Checklists and Quality Control','Checklists That Actually Work',['Checklist Builder','Inspection Tools','Audit Tools']],\n['housekeeping','Housekeeping and Cleaning Systems','Cleaning as a System, Not a Stress',['Housekeeping Shift Planner','Productivity Tracker','Cleaning Checklist','Room Inspection Tool']],\n['frontdesk','Guest Journey and Front Desk','Check-In & Check-Out: The Moments That Matter',['Guest Journey Mapper','Script Builder','Receptionist Onboarding','Guest Screening Tool']],\n['maintenance','Maintenance and Asset Protection','Preventing Maintenance Issues',['Maintenance Issue Log','Urgency Triage','Escalation Contact Card','Maintenance Audit']],\n['sops','SOPs, Decision Guidance and Documentation','Your Operations Manual',['SOP Builder','Decision Guidance Builder','Review Scheduler','Operations Manual Builder']],\n['training','Staff Onboarding and Training','Your Operations Manual',['Receptionist Onboarding','Housekeeper Onboarding','SOP Builder','Decision Guidance Builder']],\n['kpis','SLAs, KPIs and Management Review','Service Level Agreements and KPIs',['KPI/SLA Dashboard','Team KPI Tool','Review Scheduler','Operations Scorecard']]\n];\nconst questionSets={\ndaily:['Is the full hotel day mapped from early morning to night?','Are daily operational blocks clearly identified?','Does each recurring task have one accountable owner?','Are shift handovers structured and recorded?','Are daily priorities visible to the team?','Are deadlines and timing windows defined?','Are recurring bottlenecks documented and reviewed?','Is responsibility clear when managers are absent?'],\nquality:['Are checklists used for recurring duties?','Are quality standards defined separately from task completion?','Does every checklist have an owner?','Does every checklist have a deadline or frequency?','Is the definition of “done” observable?','Are completed checklists reviewed?','Are outdated checklists revised?','Are repeated omissions analysed and corrected?'],\nhousekeeping:['Is daily room workload calculated?','Are arrivals, departures and stayovers separated?','Is realistic cleaning capacity calculated?','Are room priorities assigned before work begins?','Is there a documented housekeeping shift plan?','Is cleaning quality inspected consistently?','Are linen and amenity requirements controlled?','Is housekeeping productivity monitored?','Are delays escalated before check-in time?','Is housekeeper onboarding structured and signed off?'],\nfrontdesk:['Is the complete guest journey mapped?','Are pre-arrival communications standardised?','Is guest information verified consistently?','Is the check-in process structured and controlled?','Are guest expectations clearly communicated?','Are scripts or communication guidelines available?','Is self-check-in controlled and monitored?','Are comp el profile'],['instructions','Instructions'],...categories.map(c=>[c.id,c.name]),['review','Review'],['results','Results'],['history','History']];nav.innerHTML=items.map(([id,n])=>`<button data-screen=\"${id}\" onclick=\"go('${id}')\">${n}</button>`).join('');}\nfunction renderProfile(){profileFields.innerHTML=fields.map(([id,label,type,opts])=>`<div class=\"field ${id==='purpose'?'span2':''}\"><label>${label}</label>${type==='select'?`<select id=\"p_${id}\"><option value=\"\">Select…</option>${opts.map(o=>`<option ${state.profile[id]===o?'selected':''}>${o}</option>`).join('')}</select>`:`<input id=\"p_${id}\" type=\"${type}\" value=\"${esc(state.profile[id]||'')}\">`}</div>`).join('');}\nfunction saveProfile(){fields.forEach(([id])=>state.profile[id]=document.getElementById('p_'+id).value);localStorage.setItem(SHARED,JSON.stringify(state.profile));save();}\nfunction renderCategories(){categoryScreens.innerHTML=categories.map((c,ci)=>`<section id=\"${c.id}\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Category ${String.fromCharCode(65+ci)}</div><h1>${c.name}</h1><p>Related lesson: ${c.lesson}</p></div><div class=\"progress-wrap\"><small>${ci+1} of ${categories.length}</small><div class=\"progress\"><i style=\"width:${(ci+1)/categories.length*100}%\"></i></div></div></div><div><input class=\"search no-print\" placeholder=\"Search questions\" oninput=\"filterQuestions('${c.id}',this.value)\"></div><div style=\"margin-top:14px\" id=\"qs_${c.id}\">${c.questions.map(q=>questionHTML(c,q)).join('')}</div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('${ci?categories[ci-1].id:'instructions'}')\">Back</button><button class=\"btn gold\" onclick=\"go('${ci<categories.length-1?categories[ci+1].id:'review'}')\">${ci<categories.length-1?'Next category':'Review answers'}</button></div></section>`).join('');}\nfunction questionHTML(c,q){let r=state.responses[q.id]||{};let options=[[0,'0 · Not in place'],[1,'1 · Informal'],[2,'2 · Partial q.id]&&state.responses[q.id].value!==undefined);let b=document.querySelector(`[data-screen=\"${c.id}\"]`);if(b)b.classList.toggle('done',done)})}\nfunction renderReview(){let items=[];categories.forEach(c=>c.questions.forEach(q=>{let r=state.responses[q.id];if(!r||r.value===undefined||r.value==='unsure')items.push({c,q,r})}));reviewList.innerHTML=items.length?items.map(x=>`<div class=\"card\" style=\"margin-bottom:10px\"><b>${x.c.name}</b><p>${x.q.text}</p><button class=\"btn\" onclick=\"go('${x.c.id}')\">Open category</button></div>`).join(''):`<div class=\"card\"><h3>Ready to calculate</h3><p>All questions have a selected response.</p></div>`}\nfunction calc(){let total=0,catCount=0,catResults=[],priorities=[],strengths=[],answered=0,unsure=0,na=0,evidence=0,totalQ=0;categories.forEach(c=>{let earn=0,possible=0;let local=[];c.questions.forEach(q=>{totalQ++;let r=state.responses[q.id]||{};if(r.note||r.evidence)evidence++;if(r.value==='na'){na++;return}possible+=q.weight*4;let val=r.value==='unsure'?1:(typeof r.value==='number'?r.value:0);if(r.value==='unsure')unsure++;if(r.value!==undefined)answered++;earn+=val*q.weight;local.push({q,r,val,gap:(4-val)*q.weight});if(val<=1)priorities.push({category:c,q,r,val,score:(4-val)*q.weight*(q.risk==='high'?2:1.4)});if(val===4)strengths.push({category:c,q})});let score=possible?earn/possible*100:0;catResults.push({category:c,score,local});total+=score;catCount++});let overall=catCount?total/catCount:0;let completion=answered/Math.max(1,totalQ-na);let confidencePts=completion*60+(1-unsure/Math.max(1,answered))*20+Math.min(1,evidence/Math.max(1,totalQ*.35))*20;let confidence=confidencePts>=80?'High':confidencePts>=55?'Medium':'Low';return{overall,catResults,priorities:priorities.sort((a,b)=>b.score-a.score),strengths,confidence,stats:{answered,unsure,na,evidence,totalQ}}}\nfunction level(s){return s<=20?'Reactive':s<=40?'Basic':s<=60?'Defined':s<=80?'Controlled':'Continuously Improving'}\nfunction priorityLabel(p){return p.q.weight===2&&p.val===0?'Immediate':p.score>=7?'High':p.score>=4?'Medium':'Improvement opportunity'}\nfunction recommendation(p){let v=p.val,c=p.category;if(v<=1)return `Create and assign a clear process for: ${p.q.text.replace(/\\?$/,'').toLowerCase()}.`;if(v===2)return `Improve consistency through ownership, review and evidence for this process.`;if(v===3)return `Add measurement, exception review and periodic improvement.`;return `Maintain this strength and review it periodically.`}\nfunction viewResults(){\n  const answered=Object.values(state.responses||{}).filter(r=>r&&r.value!==undefined&&r.value!==null&&r.value!=='').length;\n  if(!answered){alert('Complete at least one assessment question before viewing results. Your results will become more reliable as you answer more questions.');go('instructions');return;}\n  showResults();\n}\nfunction showResults(){saveProfile();let x=calc();let prev=state.history.at(-1);resultHotel.textContent=(state.profile.hotelName||'Hotel')+' — Maturity Assessment';resultMeta.textContent=`${state.profile.assessmentDate||''} · ${state.profile.assessor||'Assessor not entered'} · ${level(x.overall)}`;let delta=prev?x.overall-prev.overall:null;resultsContent.innerHTML=`<div class=\"grid four\"><div class=\"stat\"><div class=\"muted\">Overall maturity</div><div class=\"num\">${x.overall.toFixed(0)}%</div><b>${level(x.overall)}</b></div><div class=\"stat\"><div class=\"muted\">Confidence</div><div class=\"num\">${x.confidence}</div><b>${x.stats.answered}/${x.stats.totalQ-x.stats.na} answered</b></div><div class=\"stat\"><div class=\"muted\">Critical gaps</div><div class=\"num\">${x.priorities.filter(p=>p.q.weight===2&&p.val<=1).length}</div><b>Requires management review</b></div><div class=\"stat\"><div class=\"muted\">Change</div><div class=\"num\">${delta===null?'—':(delta>=0?'+':'')+delta.toFixed(0)+' pts'}</div><b>${prev?'Since last saved assessment':'No previous snapshot'}</b></div></div><div class=\"grid two\" style=\"margin-top:18px\" lly followed.':s<=80?'Processes are measured, reviewed and actively managed.':'Data, feedback and structured review are used to improve the operation proactively.'}\nfunction radarSVG(rs){let n=rs.length,cx=180,cy=180,R=130;let pts=rs.map((r,i)=>{let a=-Math.PI/2+i*2*Math.PI/n,rr=R*r.score/100;return[cx+Math.cos(a)*rr,cy+Math.sin(a)*rr]});let grid=[.2,.4,.6,.8,1].map(k=>`<polygon points=\"${rs.map((_,i)=>{let a=-Math.PI/2+i*2*Math.PI/n;return`${cx+Math.cos(a)*R*k},${cy+Math.sin(a)*R*k}`}).join(' ')}\" fill=\"none\" stroke=\"#d9d2bd\"/>`).join('');let axes=rs.map((r,i)=>{let a=-Math.PI/2+i*2*Math.PI/n;let x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;let lx=cx+Math.cos(a)*(R+28),ly=cy+Math.sin(a)*(R+28);return`<line x1=\"${cx}\" y1=\"${cy}\" x2=\"${x}\" y2=\"${y}\" stroke=\"#ddd\"/><text x=\"${lx}\" y=\"${ly}\" text-anchor=\"middle\" font-size=\"9\">${r.category.name.split(' ')[0]}</text>`}).join('');return`<svg class=\"radar\" viewBox=\"0 0 360 360\">${grid}${axes}<polygon points=\"${pts.map(p=>p.join(',')).join(' ')}\" fill=\"rgba(182,150,12,.28)\" stroke=\"#B6960C\" stroke-width=\"3\"/></svg>`}\nfunction roadmapHTML(x){let p=x.priorities.slice(0,12);let phases=[['First 7 days',p.slice(0,3)],['Days 8–30',p.slice(3,6)],['Days 31–60',p.slice(6,9)],['Days 61–90',p.slice(9,12)]];return`<div class=\"roadmap\">${phases.map(([name,items])=>`<div class=\"phase\"><h3>${name}</h3>${items.length?`<ul>${items.map(i=>`<li>${recommendation(i)}</li>`).join('')}</ul>`:'<p class=\"muted\">Maintain progress and review completed actions.</p>'}</div>`).join('')}</div>`}\nfunction finalizeAssessment(){let x=calc();state.history.push({id:crypto.randomUUID(),date:state.profile.assessmentDate||new Date().toISOString().slice(0,10),hotel:state.profile.hotelName||'Hotel',overall:x.overall,categories:Object.fromEntries(x.catResults.map(r=>[r.category.id,r.score])),critical:x.priorities.filter(p=>p.q.weight===2&&p.val<=1).length});save();toast('Assessment snapshot saved');renderHistory()}\nfunction renderHistory(){let h=[...state.history].reverse();historyContent.innerHTML=h.length?`<div class=\"card table-wrap\"><table class=\"table\"><thead><tr><th>Date</th><th>Hotel</th><th>Overall</th><th>Level</th><th>Critical gaps</th></tr></thead><tbody>${h.map(r=>`<tr><td>${r.date}</td><td>${esc(r.hotel)}</td><td>${r.overall.toFixed(0)}%</td><td>${level(r.overall)}</td><td>${r.critical}</td></tr>`).join('')}</tbody></table></div>`:`<div class=\"card\"><h3>No saved snapshots yet</h3><p>Save a snapshot from the results screen to begin comparison.</p></div>`}\nfunction exportJSON(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'hotel-maturity-backup.json')}\nfunction importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(!d.responses||!d.profile)throw 0;state=d;save();location.reload()}catch{alert('This file is not a valid maturity assessment backup.')}};r.readAsText(f)}\nfunction exportCSV(){let rows=[['Category','Question','Weight','Response','Note','Evidence']];categories.forEach(c=>c.questions.forEach(q=>{let r=state.responses[q.id]||{};rows.push([c.name,q.text,q.weight,r.value??'',r.note||'',r.evidence||''])}));let csv=rows.map(r=>r.map(x=>'\"'+String(x).replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n');download(new Blob([csv],{type:'text/csv'}),'hotel-maturity-answers.csv')}\nfunction download(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}\nfunction loadLatest(){let shared=JSON.parse(localStorage.getItem(SHARED)||'null');if(shared&&!state.profile.hotelName){state.profile=shared;save();renderProfile()}go(state.updated?'profile':'profile')}\nfunction buildPrint(x){printReport.innerHTML=`<div class=\"print-cover\"><div class=\"eyebrow\">Hotel Mastery Hub</div><h1 style=\"font-family:Georgia,serif;font-size:50px\">Hotel Operations<br>Maturity Assessment</h1   scorecard: "<!doctype html><html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>Hotel Operations Scorecard</title>\n<style>\n:root{--gold:#B6960C;--black:#0b0b0b;--paper:#f7f5ef;--white:#fff;--line:#ded8c5;--muted:#6b6b6b;--green:#286448;--amber:#946715;--red:#9a2c2c;--blue:#315f88}*{box-sizing:border-box}body{margin:0;font:15px/1.5 Inter,system-ui,Arial;color:#111;background:var(--paper)}button,input,select,textarea{font:inherit}.top{background:#0b0b0b;color:#fff;border-bottom:3px solid var(--gold);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;gap:15px;position:sticky;top:0;z-index:10}.brand{display:flex;align-items:center;gap:11px}.mark{width:36px;height:36px;border:2px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:Georgia,serif;font-weight:900}.brand small{display:block;color:#bbb}.tools{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:9px 13px;border-radius:8px;border:1px solid #222;background:#fff;font-weight:800;cursor:pointer}.btn.gold{background:var(--gold);border-color:var(--gold)}.btn.dark{background:#161616;color:#fff;border-color:#444}.btn.danger{color:var(--red);border-color:#d8aaaa}.layout{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 67px)}aside{background:#121212;color:#fff;padding:22px 14px}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;color:#ddd;padding:11px;text-align:left;border-left:3px solid transparent;cursor:pointer}.nav button.active{background:#252116;border-left-color:var(--gold);color:#fff}.main{padding:28px;max-width:1500px;width:100%;margin:auto}.screen{display:none}.screen.active{display:block}.hero{background:linear-gradient(135deg,#111,#211d10);color:#fff;padding:42px;border-radius:16px;overflow:hidden}.hero h1{font:46px/1.05 Georgia,serif;margin:10px 0}.hero p{color:#d5d5d5;font-size:17px;max-width:800px}.eyebrow{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:19px;box-shadow:0 8px 24px rgba(0,0,0,.05)}.grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:18px}.section-head h1{font:35px Georgia,serif;margin:0}.section-head p,.muted{color:var(--muted)}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field label{font-weight:800;display:block;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #cec7b4;padding:10px;border-radius:7px}.stat{background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);padding:17px;border-radius:11px}.stat .num{font-size:30px;font-weight:900}.status{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:4px 9px;font-size:11px;font-weight:900;text-transform:uppercase}.status:before{content:'';width:8px;height:8px;border-radius:50%;background:currentColor}.on-target{color:var(--green);background:#e9f5ef}.warning{color:var(--amber);background:#fff4d9}.critical{color:var(--red);background:#fdeaea}.no-data{color:#666;background:#eee}.metric{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:16px;margin-bottom:11px}.metric-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.metric-grid{display:grid;grid-template-columns:120px 120px 110px 110px 1fr;gap:8px;margin-top:12px;align-items:end}.metric-grid label{font-size:11px;text-transform:uppercase;font-weight:900;color:#666}.metric-grid input,.metric-grid select{width:100%;padding:9px;border:1px solid #d4cdbb;border-radius:7px}.info{border:0;background:var(--gold);width:22px;height:22px;border-radius:50%;font-weight:900;cursor:pointer}.bar-row{display:grid;grid-template-columns:220px 1fr 50px 110px;gap:10px;align-items:center;margin-bottom:10px}.bar{height:13px;background:#e9e4d7;border-radius:20px;overflow:hidden}.bar i{display:block;height:100%;background:var(--gold)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{padding:10px;border-bottom:1px solid #e5dfcf;text-align:left}.table th{background:#161616;color:#fff}.action{border-left:5px solid var(--gold)}.action.overdue{border-left-color:var(--red)}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;border-left:4px solid var(--gold);padding:12px 16px;border-radius:8px;display:none}.footer-nav{display:flex;justify-content:space-between;gap:8px;margin-top:18px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:50;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modal-box{background:#fff;max-width:760px;width:100%;max-height:90vh;overflow:auto;border-top:6px solid var(--gold);padding:24px}.help-grid{display:grid;grid-template-columns:160px 1fr;gap:8px 14px}.template-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.small{font-size:12px}.custom-panel{border:1px dashed #b9ad85;background:#fffaf0;padding:16px;border-radius:10px;margin-bottom:16px}.pill{display:inline-block;padding:3px 8px;border-radius:20px;background:#eee;font-size:11px;font-weight:800}.metric-edit{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr;gap:8px;align-items:end}.metric-edit .wide{grid-column:span 2}@media(max-width:1050px){.layout{grid-template-columns:1fr}aside{padding:10px}.nav{grid-template-columns:repeat(4,1fr)}.grid.four{grid-template-columns:repeat(2,1fr)}.metric-grid,.metric-edit{grid-template-columns:repeat(3,1fr)}}@media(max-width:700px){.main{padding:15px}.nav{grid-template-columns:repeat(2,1fr)}.grid.two,.grid.three,.grid.four,.form-grid{grid-template-columns:1fr}.metric-grid,.metric-edit{grid-template-columns:1fr 1fr}.bar-row{grid-template-columns:130px 1fr 42px}.bar-row .status{display:none}.hero{padding:28px}.hero h1{font-size:35px}.help-grid{grid-template-columns:1fr}}@media print{.top,aside,.no-print{display:none!important}.layout{display:block}.main{padding:0}.screen{display:none!important}#report{display:block!important}.card,.stat{box-shadow:none;break-inside:avoid}.table th{background:#eee!important;color:#000!important}.print-cover{height:92vh;display:flex;flex-direction:column;justify-content:center;border-bottom:6px solid var(--gold)}}\n\n/* Mobile phone optimisation */\n@media(max-width:700px){\n  body{font-size:14px}\n  .top{position:static;display:grid;grid-template-columns:1fr;padding:10px 12px;gap:9px}\n  .brand{min-width:0}.brand strong{font-size:15px}.brand small{font-size:11px}.mark{width:32px;height:32px;flex:0 0 32px}\n  .tools{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));width:100%;gap:7px}\n  .tools .btn,.tools label.btn{padding:9px 6px;font-size:11px;text-align:center;min-width:0}\n  .layout{display:block;min-height:0}\n  .sidebar{padding:7px 8px;position:sticky;top:0;z-index:9;border-right:0;border-bottom:1px solid #333;overflow:hidden}\n  .nav{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}.nav::-webkit-scrollbar{display:none}\n  .nav button{width:auto;flex:0 0 auto;white-space:nowrap;border-left:0;border-bottom:3px solid transparent;border-radius:7px;padding:9px 11px;font-size:12px}\n  .nav button.active{border-left:0;border-bottom-color:var(--gold)}\n  .main{padding:14px 12px 50px}\n  .hero{padding:24px 18px}.hero h1{font-size:31px}\n  .section-head{display:block}.section-head h1{font-size:27px}\n  .metric-head{display:block}.metric-head>div:last-child{margin-top:10px}\n  .metric-grid,.form-grid,.grid.two,.grid.three,.grid.four{grid-template-columns:1fr!important}\n  .bar-row{grid-template-columns:1fr 44px;gap:7px}.bar-row .bar{grid-column:1/-1;grid-row:2}.bar-row .status{grid-column:1/-1;width:max-content}\n  .table{min-width:720px}\n  .modal-box{width:calc(100% - 20px);max-height:90vh;overflow:auto;padding:16px}\n}\n</style></head><body><header class=\"top\"><div class=\"brand\"><div class=\"mark\">HM</div><div><strong>Hotel Mastery Hub</strong><small>Operations Scorecard</small></div></div><div class=\"tools\"><span id=\"saved\" style=\"color:#bbb\">Saved locally</span><button class=\"btn dark\" onclick=\"exportData()\">Backup</button><label class=\"btn dark\">Restore<input hidden type=\"file\" accept=\"application/json\" onchange=\"importData(event)\"></label><button class=\"btn gold\" onclick=\"showDashboard()\">Dashboard</button></div></header><div class=\"layout\"><aside><div class=\"nav\" id=\"nav\"></div></aside><main class=\"main\">\n<section id=\"welcome\" class=\"screen active\"><div class=\"hero\"><div class=\"eyebrow\">Weekly and monthly management control</div><h1>Use only the metrics that matter to your hotel.</h1><p>Start with a small essential scorecard, customise every item, add your own measures, explain where each number comes from and turn missed targets into management actions.</p><div style=\"margin-top:24px\"><button class=\"btn gold\" onclick=\"go('profile')\">Set up scorecard</button></div></div><div class=\"grid three\" style=\"margin-top:16px\"><div class=\"card\"><h3>Choose and customise</h3><p class=\"muted\">Enable, disable, rename or add metrics. No-data items are excluded from scoring.</p></div><div class=\"card\"><h3>Understand every target</h3><p class=\"muted\">Each metric explains its source, calculation, direction and sample target.</p></div><div class=\"card\"><h3>Keep automatic scoring</h3><p class=\"muted\">Custom metrics calculate normally using their target, direction and weight.</p></div></div></section>\n<section id=\"profile\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Setup</div><h1>Hotel and reporting period</h1></div></div><div class=\"card\"><div class=\"form-grid\" id=\"profileFields\"></div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('welcome')\">Back</button><button class=\"btn gold\" onclick=\"saveProfile();go('configure')\">Continue</button></div></div></section>\n<section id=\"configure\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Scorecard design</div><h1>Choose and customise metrics</h1><p>Templates replace the active metric list. You can then edit every item or add your own.</p></div><button class=\"btn gold\" onclick=\"showAddMetric()\">+ Add custom metric</button></div><div class=\"template-row\"><button class=\"btn\" onclick=\"applyTemplate('essential')\">Essential (10)</button><button class=\"btn\" onclick=\"applyTemplate('full')\">Full operations</button><button class=\"btn\" onclick=\"applyTemplate('blank')\">Blank</button></div><div id=\"addMetricPanel\"></div><div id=\"configGroups\"></div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('profile')\">Back</button><button class=\"btn gold\" onclick=\"go('metrics')\">Enter results</button></div></section>\n<section id=\"metrics\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Metric entry</div><h1>Enter actual results</h1><p>Only enabled metrics appear. Empty actuals are treated as “No data” and excluded from all scores.</p></div><button class=\"btn no-print\" onclick=\"resetActuals()\">Clear actuals</button></div><div id=\"metricGroups\"></div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('configure')\">Customise metrics</button><button class=\"btn gold\" onclick=\"showDashboard()\">Calculate scorecard</button></div></section>\n<section id=\"dashboard\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Current period</div><h1 id=\"dashTitle\">Operations Scorecard</h1><p id=\"dashMeta\"></p></div><div class=\"tools no-print\"><button class=\"btn\" onclick=\"window.print()\">Print / Save PDF</button><button class=\"btn\" onclick=\"savePeriod()\">Save period</button><button class=\"btn gold\" onclick=\"go('actions')\">Review actions</button></div></div><div id=\"dashboardContent\"></div></section>\n<section id=\"actions\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Management review</div><h1>Corrective actions</h1></div><button class=\"btn gold no-print\" onclick=\"newAction()\">New action</button></div><div id=\"actionForm\"></div><div id=\"actionsList\" style=\"margin-top:15px\"></div></section>\n<section id=\"history\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Trends</div><h1>Saved periods</h1></div></div><div id=\"historyContent\"></div></section><section id=\"report\" class=\"screen\"></section></main></div><div id=\"toast\" class=\"toast\"></div>\n<div class=\"modal\" id=\"helpModal\" onclick=\"if(event.target===this)closeHelp()\"><div class=\"modal-box\"><div style=\"display:flex;justify-content:space-between;gap:10px\"><div><div class=\"eyebrow\">Metric guide</div><h2 id=\"helpTitle\"></h2></div><button class=\"btn\" onclick=\"closeHelp()\">Close</button></div><div id=\"helpBody\"></div></div></div>\n<script>\nconst KEY='hmh_scorecard_v2',OLD_KEY='hmh_scorecard_v1',SHARED='hmh_hotel_profile_v1';\nconst DEPTS={guest:'Guest Experience',front:'Front Desk',housekeeping:'Housekeeping',maintenance:'Maintenance',people:'People & Documentation',management:'Commercial & Management'};\nconst LIBRARY=[\n{id:'guest_review',name:'Guest review score',department:'guest',type:'higher',unit:'/5',target:4.5,warning:4.2,critical:4,weight:1,essential:true,source:'Booking.com, Google, Expedia or direct guest survey report.',formula:'Average of review scores for the selected period.',meaning:'Average guest rating. Higher is better.',targetGuide:'Use the hotel’s current rating and service ambition. A starting target of 4.3–4.5 out of 5 may suit many properties, but it is not universal.',example:'4.4 average rating against a 4.5 target.'},\n{id:'complaint_rate',name:'Complaint rate',department:'guest',type:'lower',unit:'%',target:2,warning:3,critical:5,weight:1,essential:false,source:'Complaint log and occupied-room-night report.',formula:'Recorded complaints ÷ occupied room nights × 100.',meaning:'Complaints relative to occupied room nights. Lower is better.',targetGuide:'First define exactly what counts as a complaint. Use historical performance as the baseline.',example:'6 complaints ÷ 300 occupied room nights × 100 = 2%.'},\n{id:'complaint_sla',name:'Complaint resolution within SLA',department:'guest',type:'higher',unit:'%',target:95,warning:90,critical:80,weight:2,essential:true,source:'Complaint log with opened and resolved timestamps.',formula:'Complaints resolved within the agreed time ÷ eligible complaints × 100.',meaning:'How reliably guest complaints are resolved within the hotel’s promised time.',targetGuide:'Define an internal SLA first, such as acknowledgement within 10 minutes and resolution within 30 minutes where possible.',example:'18 of 20 eligible complaints resolved within SLA = 90%.'},\n{id:'checkin_accuracy',name:'Check-in accuracy',department:'front',type:'higher',unit:'%',target:99,warning:97,critical:94,weight:2,essential:false,source:'Check-in audit, PMS exception report or manual sample.',formula:'Accurate check-ins ÷ audited check-ins × 100.',meaning:'Correct guest, payment, room, key and required information processing.',targetGuide:'Define the audit checklist before setting the target.',example:'98 accurate check-ins out of 100 audited = 98%.'},\n{id:'checkin_duration',name:'Average check-in duration',department:'front',type:'lower',unit:'min',target:5,warning:7,critical:10,weight:1,essential:false,source:'PMS timestamps or a manual timing sample.',formula:'Total minutes for sampled check-ins ÷ number sampled.',meaning:'Average time from starting the check-in to completion. Lower is usually better.',targetGuide:'Set according to service model. A full-service welcome may intentionally take longer than self-check-in.',example:'60 total minutes across 10 check-ins = 6 minutes.'},\n{id:'handover',name:'Shift handover completion',department:'front',type:'higher',unit:'%',target:100,warning:95,critical:85,weight:2,essential:true,source:'Shift handover checklist or digital handover log.',formula:'Completed handovers ÷ required handovers × 100.',meaning:'Whether required shift handovers were completed.',targetGuide:'For a critical daily control, the target is often 100%.',example:'27 completed of 28 required handovers = 96.4%.'},\n{id:'rooms_ready',name:'Rooms ready by target time',department:'housekeeping',type:'higher',unit:'%',target:95,warning:90,critical:80,weight:2,essential:true,source:'PMS room status, housekeeping planner or arrival-room log.',formula:'Arrival rooms ready by official check-in time ÷ total arrival rooms × 100.',meaning:'Reliability of room readiness for arriving guests.',targetGuide:'Base the target on the hotel’s check-in promise and capacity. A sample starting target is 90–95%.',example:'38 ready rooms ÷ 40 arrival rooms × 100 = 95%.'},\n{id:'inspection_pass',name:'Room inspection pass rate',department:'housekeeping',type:'higher',unit:'%',target:95,warning:90,critical:80,weight:2,essential:true,source:'Room inspection tool or supervisor inspection log.',formula:'Rooms passing first inspection ÷ rooms inspected × 100.',meaning:'First-time quality acceptance after cleaning.',targetGuide:'Use a consistent inspection checklist and definition of pass.',example:'45 first-pass rooms ÷ 50 inspected = 90%.'},\n{id:'cleaning_time',name:'Average cleaning time',department:'housekeeping',type:'range',unit:'min',target:30,warning:5,critical:10,weight:1,essential:false,source:'Housekeeping shift planner, productivity tracker or time sample.',formula:'Total cleaning minutes ÷ rooms cleaned. For range scoring, target is the centre and warning/critical are tolerances.',meaning:'Average cleaning duration. Too high may indicate inefficiency; too low may threaten quality.',targetGuide:'Calculate separately by room type when possible. Enter the expected average as target, warning tolerance and critical tolerance in minutes.',example:'Target 30, warning tolerance 5, critical tolerance 10 means 25–35 is acceptable.'},\n{id:'urgent_sla',name:'Urgent maintenance SLA achievement',department:'maintenance',type:'higher',unit:'%',target:95,warning:85,critical:70,weight:2,essential:true,source:'Maintenance issue log with urgency and timestamps.',formula:'Urgent issues handled within SLA ÷ eligible urgent issues × 100.',meaning:'Reliability of urgent maintenance response or resolution.',targetGuide:'Define what “urgent” means and whether the SLA measures response or resolution.',example:'9 of 10 urgent issues met the SLA = 90%.'},\n{id:'overdue_issues',name:'Overdue maintenance issues',department:'maintenance',type:'lower',unit:'count',target:0,warning:2,critical:5,weight:2,essential:true,source:'Maintenance issue log filtered by overdue/open status.',formula:'Count of open issues beyond their due date or SLA.',meaning:'Backlog of maintenance items that missed their deadline.',targetGuide:'The ideal target is usually zero, but thresholds should reflect property size and issue definitions.',example:'3 overdue items produces a warning when warning threshold is 2.'},\n{id:'preventive_checks',name:'Preventive checks completed',department:'maintenance',type:'higher',unit:'%',target:100,warning:90,critical:75,weight:2,essential:false,source:'Preventive maintenance checklist or calendar.',formula:'Completed scheduled checks ÷ checks due × 100.',meaning:'Completion of planned preventive maintenance work.',targetGuide:'Use 100% when every scheduled check is expected to be completed.',example:'18 of 20 scheduled checks = 90%.'},\n{id:'onboarding',name:'Onboarding completion',department:'people',type:'higher',unit:'%',target:100,warning:90,critical:75,weight:1,essential:false,source:'Role onboarding checklist or employee file.',formula:'Completed required onboarding items ÷ required items × 100.',meaning:'Completion of required onboarding for employees in scope.',targetGuide:'Define the deadline, such as completion within the first 14 days.',example:'45 of 50 required items completed = 90%.'},\n{id:'sop_review',name:'SOP reviews completed',department:'people',type:'higher',unit:'%',target:100,warning:90,critical:75,weight:1,essential:true,source:'Operations manual review scheduler.',formula:'SOP reviews completed by due date ÷ SOP reviews due × 100.',meaning:'Whether scheduled document reviews were completed.',targetGuide:'The target is normally 100% of reviews due, not 100% of all SOPs every period.',example:'9 of 10 due reviews completed = 90%.'},\n{id:'occupancy',name:'Occupancy',department:'management',type:'higher',unit:'%',target:75,warning:65,critical:50,weight:1,essential:false,source:'PMS or monthly rooms report.',formula:'Rooms sold ÷ rooms available × 100.',meaning:'Percentage of available rooms sold.',targetGuide:'Use the approved budget, forecast, season and market—not a generic industry target.',example:'750 room nights sold ÷ 1,000 available = 75%.'},\n{id:'adr',name:'Average Daily Rate (ADR)',department:'management',type:'higher',unit:'currency',target:120,warning:105,critical:90,weight:1,essential:false,source:'PMS or rooms revenue report.',formula:'Room revenue ÷ rooms sold.',meaning:'Average room revenue per room sold.',targetGuide:'Use the hotel budget or forecast for the period and local currency.',example:'€12,000 room revenue ÷ 100 rooms sold = €120 ADR.'},\n{id:'revpar',name:'RevPAR',department:'management',type:'higher',unit:'currency',target:90,warning:75,critical:60,weight:1,essential:false,source:'PMS, or calculate from ADR and occupancy.',formula:'Room revenue ÷ available rooms, or ADR × occupancy as a decimal.',meaning:'Room revenue earned per available room.',targetGuide:'Use budget or forecast. Ensure occupancy is converted from percentage to decimal.',example:'€120 ADR × 0.75 occupancy = €90 RevPAR.'},\n{id:'labour_cost',name:'Labour cost per occupied room',department:'management',type:'lower',unit:'currency',target:35,warning:42,critical:50,weight:1,essential:false,source:'Payroll report plus occupied-room-night report.',formula:'Relevant labour cost ÷ occupied room nights.',meaning:'Labour cost associated with each occupied room night.',targetGuide:'Define which labour departments and employment costs are included before comparing periods.',example:'€10,500 labour cost ÷ 300 occupied room nights = €35.'},\n{id:'sla_total',name:'Overall SLA achievement',department:'management',type:'higher',unit:'%',target:95,warning:90,critical:80,weight:2,essential:true,source:'Department SLA logs or a combined SLA dashboard.',formula:'Eligible SLA items achieved ÷ total eligible SLA items × 100.',meaning:'Combined compliance with the service standards included in the calculation.',targetGuide:'List the SLAs included and keep definitions consistent between periods.',example:'190 of 200 eligible items met SLA = 95%.'},\n{id:'action_completion',name:'Corrective-action completion',department:'management',type:'higher',unit:'%',target:90,warning:75,critical:60,weight:2,essential:true,source:'Corrective-action list in this scorecard or another action tracker.',formula:'Actions completed by due date ÷ actions due × 100.',meaning:'Management follow-through on agreed actions.',targetGuide:'Count only actions due in the period; do not include future-dated actions.',example:'8 of 10 due actions completed = 80%.'}\n];\nconst navItems=[['welcome','Overview'],['profile','Period setup'],['configure','Customise'],['metrics','Enter results'],['dashboard','Dashboard'],['actions','Actions'],['history','History']];\nlet state=load();\nfunction clone(o){return JSON.parse(JSON.stringify(o))}function uid(){return crypto.randomUUID?crypto.randomUUID():'m_'+Date.now()+'_'+Math.random().toString(36).slice(2)}\nfunction defaultMetrics(){return LIBRARY.filter(x=>x.essential).map(x=>({...clone(x),enabled:true,custom:false}))}\nfunction load(){try{let d=JSON.parse(localStorage.getItem(KEY));if(d&&Array.isArray(d.metrics))return d}catch(e){};return{profile:{periodType:'Monthly'},metrics:defaultMetrics(),values:{},actions:[],periods:[]}}\nfunction save(){localStorage.setItem(KEY,JSON.stringify(state));saved.textContent='Saved '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});setTimeout(()=>saved.textContent='Saved locally',1400)}\nfunction esc(s=''){return String(s).replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]))}\nfunction toast(t){let x=document.getElementById('toast');x.textContent=t;x.style.display='block';setTimeout(()=>x.style.display='none',1800)}\nfunction init(){nav.innerHTML=navItems.map(([id,n])=>`<button id=\"nav_${id}\" onclick=\"go('${id}')\">${n}</button>`).join('');renderProfile();renderConfigure();renderMetrics();renderActions();renderHistory();go('welcome')}\nfunction go(id){document.querySelectorAll('.screen').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));document.getElementById('nav_'+id)?.classList.add('active');if(id==='configure')renderConfigure();if(id==='metrics')renderMetrics();if(id==='actions')renderActions();if(id==='history')renderHistory();scrollTo(0,0)}\nfunction renderProfile(){let fields=[['hotelName','Hotel name','text'],['periodType','Period','select'],['startDate','Start date','date'],['endDate','End date','date'],['manager','Prepared by','text'],['notes','Management context','text']];profileFields.innerHTML=fields.map(([k,l,t])=>`<div class=\"field\"><label>${l}</label>${t==='select'?`<select id=\"p_${k}\">${['Daily','Weekly','Monthly','Custom'].map(v=>`<option ${state.profile[k]===v?'selected':''}>${v}</option>`).join('')}</select>`:`<input id=\"p_${k}\" type=\"${t}\" value=\"${esc(state.profile[k]||'')}\">`}</div>`).join(' me}</span><div class=\"bar\"><i style=\"width:${d.score??0}%\"></i></div><b>${d.score===null?'—':d.score.toFixed(0)+'%'}</b></div>`).join('')}<h2>Metric results</h2><div class=\"table-wrap\"><table class=\"table\"><thead><tr><th>Metric</th><th>Actual</th><th>Target</th><th>Score</th><th>Status</th></tr></thead><tbody>${x.all.map(m=>`<tr><td>${esc(m.name)}</td><td>${m.actual===null?'—':m.actual+' '+esc(m.unit)}</td><td>${m.target??m.target} ${esc(m.unit)}</td><td>${m.score===null?'—':m.score.toFixed(0)+'%'}</td><td>${m.status[0]}</td></tr>`).join('')}</tbody></table></div><p style=\"font-size:12px;color:#666;border-top:1px solid #ccc;padding-top:12px\">Disabled and no-data metrics are excluded from scoring. Suggested indicators and targets are examples. Each property should define appropriate metrics, targets and service standards based on its operating model, local requirements and business objectives.</p>`}\ninit();\n<\/script></body></html>\n"
};
function mountTool(name){
  const frame=document.getElementById('frame-'+name);
  if(frame.dataset.mounted==='1') return;
  const doc=frame.contentWindow.document;
  doc.open(); doc.write(embeddedTools[name]); doc.close();
  frame.dataset.mounted='1';
}
function openTool(name){
  mountTool(name);
  ['maturity','scorecard'].forEach(key=>{
    document.getElementById('frame-'+key).classList.toggle('active',key===name);
    document.getElementById('tab-'+key).classList.toggle('active',key===name);
  });
  try{localStorage.setItem('hmh-suite-active-tool',name)}catch(e){}
}
window.addEventListener('load',()=>{
  let active='maturity';
  try{active=localStorage.getItem('hmh-suite-active-tool')||'maturity'}catch(e){}
  mountTool('maturity');
  openTool(active==='scorecard'?'scorecard':'maturity');
});
</script>
</body>
</html>
