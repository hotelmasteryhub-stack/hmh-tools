<style>
:root{--gold:#B6960C;--black:#080808;--white:#fff;--paper:#f7f5ef;--line:#292929}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--black);color:var(--white);overflow:hidden}
.suite{height:100%;display:grid;grid-template-rows:auto auto 1fr}
.header{position:relative;background:linear-gradient(180deg,#101010 0%,#070707 100%);border-bottom:4px solid var(--gold);padding:14px 28px;display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:24px;min-height:104px;box-shadow:0 4px 18px rgba(0,0,0,.28)}
.brand{display:flex;align-items:center;min-width:0;gap:26px}
.brand-logo{width:360px;max-width:38vw;height:72px;object-fit:contain;object-position:left center;display:block}
.brand-divider{width:1px;height:68px;background:rgba(182,150,12,.78);flex:0 0 1px}
.product-lockup{min-width:0}
.product-title{font-family:Georgia,'Times New Roman',serif;color:#fff;font-size:23px;line-height:1.12;letter-spacing:.045em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 8px rgba(255,255,255,.08)}
.product-subtitle{margin-top:11px;color:var(--gold);font-size:12px;line-height:1;letter-spacing:.17em;font-weight:800;text-transform:uppercase}
.mobile-brand{display:none;align-items:center;gap:14px;min-width:0}
.mobile-monogram{width:54px;height:54px;object-fit:contain;flex:0 0 54px}
.mobile-copy{min-width:0}
.mobile-title{font-family:Georgia,'Times New Roman',serif;color:#fff;font-size:15px;line-height:1.12;letter-spacing:.025em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mobile-subtitle{margin-top:7px;color:var(--gold);font-size:9px;letter-spacing:.15em;font-weight:800;text-transform:uppercase}
.switcher{background:#111;display:flex;border-bottom:1px solid #303030;overflow-x:auto}
.tool-tab{appearance:none;border:0;border-right:1px solid #303030;background:#111;color:#bbb;padding:13px 22px;cursor:pointer;font-size:11px;letter-spacing:1.8px;font-weight:800;white-space:nowrap}
.tool-tab:hover{color:#fff;background:#181818}
.tool-tab.active{background:var(--gold);color:#000}
.stage{position:relative;min-height:0;background:var(--paper)}
.tool-frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--paper);display:none}
.tool-frame.active{display:block}
@media(max-width:700px){.desktop-brand{display:none}.mobile-brand{display:flex}.switcher{overflow-x:auto}.tool-tab{padding:11px 14px;font-size:9px;min-width:225px}.stage{min-height:0}}
@media print{.header,.switcher{display:none!important}.suite{display:block;height:auto}.stage{position:static}.tool-frame{position:static;height:100vh}}

.suite-action-group{display:inline-flex;align-items:center;gap:4px}.suite-info-btn{width:22px;height:22px;border:1px solid var(--gold);border-radius:50%;background:transparent;color:var(--gold);display:inline-grid;place-items:center;padding:0;font:800 12px/1 system-ui;cursor:pointer;flex:0 0 auto}.suite-info-btn:hover,.suite-info-btn:focus-visible{background:var(--gold);color:#000;outline:none}.mobile-action-row{display:grid;grid-template-columns:1fr auto;align-items:center;border-bottom:1px solid #292929}.mobile-action-row .mobile-menu-action{border-bottom:0}.mobile-action-row .suite-info-btn{margin-right:10px}.suite-help-modal{display:none;position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.84);padding:20px;align-items:center;justify-content:center}.suite-help-modal.open{display:flex}.suite-help-box{width:min(560px,100%);background:#fff;color:#1c1c1c;border:1px solid var(--gold);border-radius:12px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.55)}.suite-help-head{display:flex;align-items:center;justify-content:space-between;gap:16px;background:#111;color:#fff;padding:14px 16px;border-bottom:2px solid var(--gold)}.suite-help-head h3{margin:0;font:700 20px/1.2 Georgia,serif}.suite-help-close{border:0;background:transparent;color:var(--gold);font-size:28px;line-height:1;cursor:pointer}.suite-help-body{padding:20px;font:14px/1.65 system-ui,-apple-system,Segoe UI,Arial,sans-serif}.suite-help-body p{margin:0 0 12px}.suite-help-body p:last-child{margin-bottom:0}.suite-help-body ul{margin:8px 0 14px;padding-left:20px}.suite-help-warning{border-left:4px solid var(--gold);background:#f8f5ef;padding:11px 13px;font-weight:700}@media(max-width:650px){.suite-help-modal{padding:12px}.suite-help-body{padding:17px;font-size:13px}.suite-help-head h3{font-size:18px}}@media print{.suite-info-btn,.suite-help-modal{display:none!important}}
.suite-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.suite-header-btn{border:1px solid rgba(182,150,12,.52);background:rgba(255,255,255,.025);color:#eee;padding:9px 12px;border-radius:5px;font-size:10px;letter-spacing:1px;font-weight:800;cursor:pointer}.suite-header-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(182,150,12,.09)}.mobile-menu-btn{display:none;border:0;background:transparent;color:var(--gold);font-size:31px;line-height:1;padding:6px 4px;cursor:pointer}.mobile-actions-menu{display:none;position:absolute;top:calc(100% + 1px);right:10px;z-index:10000;width:min(260px,calc(100vw - 20px));background:#101010;border:1px solid rgba(182,150,12,.65);border-top:3px solid var(--gold);box-shadow:0 16px 40px rgba(0,0,0,.48);padding:7px}.mobile-actions-menu.open{display:grid}.mobile-menu-action{width:100%;border:0;border-bottom:1px solid #292929;background:transparent;color:#f2f2f2;text-align:left;padding:13px 12px;font:800 10px/1 system-ui;letter-spacing:1.1px;cursor:pointer}.mobile-menu-action:last-child{border-bottom:0}.mobile-menu-action:hover{background:#1b1b1b;color:var(--gold)}
.suite-video-btn{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 12px;border-radius:6px;font-size:10px;letter-spacing:1px;font-weight:800;cursor:pointer}.suite-video-btn:hover{background:var(--gold);color:#000}.suite-video-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.84);padding:20px;align-items:center;justify-content:center}.suite-video-modal.open{display:flex}.suite-video-box{width:min(900px,100%);background:#fff;border:1px solid var(--gold);border-radius:12px;overflow:hidden}.suite-video-head{display:flex;align-items:center;justify-content:space-between;background:#111;color:#fff;padding:13px 16px;border-bottom:2px solid var(--gold)}.suite-video-head h3{margin:0;font-family:Georgia,serif}.suite-video-close{border:0;background:transparent;color:var(--gold);font-size:28px;cursor:pointer}.suite-video-frame{position:relative;padding-top:56.25%;background:#000}.suite-video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}@media print{.suite-video-btn,.suite-video-modal{display:none!important}}

/* Mobile release refinements: presentation only */
@media(max-width:700px){
  html,body{overflow:hidden;width:100%;max-width:100%}
  .suite{grid-template-rows:auto auto minmax(0,1fr);height:100dvh}
  .header{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;padding:10px 13px;gap:10px;min-height:78px;border-bottom-width:3px}
  .desktop-brand{display:none}
  .mobile-brand{display:flex}
  .suite-actions{display:none}
  .mobile-menu-btn{display:block}
  .suite-video-btn{margin:0;padding:8px 9px;font-size:9px;line-height:1.15;white-space:nowrap}
  .switcher{display:grid;grid-template-columns:1fr 1fr;overflow:visible}
  .tool-tab{min-width:0;width:100%;padding:10px 6px;font-size:8px;line-height:1.25;letter-spacing:.7px;white-space:normal;text-align:center}
  .stage{min-height:0;height:auto}
  .tool-frame{position:absolute;inset:0;width:100%;height:100%}
  .suite-video-modal{padding:8px}
  .suite-video-box{width:100%;max-height:96dvh}
  .suite-video-head{padding:10px 12px}
  .suite-video-head h3{font-size:16px;line-height:1.2}
}
@media(max-width:380px){
  .header{grid-template-columns:minmax(0,1fr) auto}
  .mobile-monogram{width:48px;height:48px;flex-basis:48px}
  .mobile-title{font-size:12px}
  .mobile-subtitle{font-size:8px}
}

</style>
</head>

<div class="suite">

function toggleMobileHeaderMenu(button){
  const menu=document.getElementById('mobileHeaderMenu');

  button.setAttribute('aria-expanded',String(isOpen));

function closeMobileHeaderMenu(){
  const menu=document.getElementById('mobileHeaderMenu');
  const button=document.querySelector('.mobile-menu-btn');
  if(menu) menu.classList.remove('open');
  if(button) button.setAttribute('aria-expanded','false');
}

function openSuiteHelp(type){
  const modal=document.getElementById('suiteHelpModal');
  const title=document.getElementById('suiteHelpTitle');

  }else{

    body.innerHTML='<p>Downloads one complete copy of the data saved in this suite, including the Maturity Assessment, Operations Scorecard, history, settings and custom metrics.</p><p>Keep the JSON backup file somewhere safe. It can be used later to recover your work or move it to another browser or device.</p>';

  modal.setAttribute('aria-hidden','false');
}
function closeSuiteHelp(){
  const modal=document.getElementById('suiteHelpModal');
  if(!modal)return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
}
function decodeBase64Utf8(value){
  const binary=atob(value);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function suiteStorageSnapshot(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key&&key.startsWith('hmh_')) data[key]=localStorage.getItem(key);
  }
  return data;
}
function backupSuite(){
  try{
    const payload={
      product:'Hotel Operations Management Suite',
      version:1,
      exportedAt:new Date().toISOString(),
      storage:suiteStorageSnapshot()
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='hotel-operations-management-suite-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
  }catch(error){alert('The suite backup could not be created.');}
}
function restoreSuite(event){
  const input=event.target;
  const file=input.files&&input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const payload=JSON.parse(reader.result);
      if(!payload||!payload.storage||typeof payload.storage!=='object') throw new Error('Invalid suite backup');
      if(!confirm('Restore the complete suite backup? This will replace the currently saved assessment and scorecard data.')){input.value='';return;}
      Object.keys(localStorage).filter(key=>key.startsWith('hmh_')).forEach(key=>localStorage.removeItem(key));
      Object.entries(payload.storage).forEach(([key,value])=>{if(key.startsWith('hmh_')&&typeof value==='string')localStorage.setItem(key,value);});
      input.value='';
      location.reload();
    }catch(error){input.value='';alert('This is not a valid Hotel Operations Management Suite backup.');}
  };
  reader.readAsText(file);
}
function openSuiteVideo(){
  const m=document.getElementById('suiteVideoModal');
  const f=document.getElementById('suiteVideoFrame');
  if(!m||!f)return;
  f.src='https://www.youtube-nocookie.com/embed/9022tS0Hme0?rel=0';
  m.classList.add('open');
  m.setAttribute('aria-hidden','false');
}
function closeSuiteVideo(){
  const m=document.getElementById('suiteVideoModal');
  const f=document.getElementById('suiteVideoFrame');
  if(!m||!f)return;
  f.src='';
  m.classList.remove('open');
  m.setAttribute('aria-hidden','true');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSuiteVideo();closeSuiteHelp();closeMobileHeaderMenu();}});
function mountTool(name){
  const frame=document.getElementById('frame-'+name);
  if(!frame||frame.dataset.mounted==='1')return;
  frame.srcdoc=embeddedTools[name];
  frame.dataset.mounted='1';
}
function openTool(name){
  mountTool(name);
  ['maturity','scorecard'].forEach(key=>{
    const frame=document.getElementById('frame-'+key);
    const tab=document.getElementById('tab-'+key);
    if(frame)frame.classList.toggle('active',key===name);
    if(tab)tab.classList.toggle('active',key===name);
  });
  try{localStorage.setItem('hmh-suite-active-tool',name)}catch(e){}
}
function bootSuite(){
  let active='maturity';
  try{active=localStorage.getItem('hmh-suite-active-tool')||'maturity'}catch(e){}
  mountTool('maturity');
  openTool(active==='scorecard'?'scorecard':'maturity');
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bootSuite);else bootSuite();
