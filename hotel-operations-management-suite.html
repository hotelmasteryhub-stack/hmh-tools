<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Operations Management Suite — Hotel Mastery Hub</title>
<style>
:root{--gold:#B6960C;--black:#080808;--white:#fff;--paper:#f7f5ef;--line:#292929}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--black);color:var(--white);overflow:hidden}
.suite{height:100%;display:grid;grid-template-rows:auto auto 1fr}
.header{background:#000;border-bottom:3px solid var(--gold);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:35px;height:35px;border:2px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:Georgia,serif;font-weight:800}
.brand-name{font-size:11px;letter-spacing:3px;color:var(--gold);font-weight:800}
.brand-sub{font-size:12px;color:#ddd;margin-top:2px}
.header-note{font-size:11px;color:#aaa;text-align:right;max-width:390px}
.switcher{background:#111;display:flex;border-bottom:1px solid #303030;overflow-x:auto}
.tool-tab{appearance:none;border:0;border-right:1px solid #303030;background:#111;color:#bbb;padding:13px 22px;cursor:pointer;font-size:11px;letter-spacing:1.8px;font-weight:800;white-space:nowrap}
.tool-tab:hover{color:#fff;background:#181818}
.tool-tab.active{background:var(--gold);color:#000}
.stage{position:relative;min-height:0;background:var(--paper)}
.tool-frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--paper);display:none}
.tool-frame.active{display:block}
@media(max-width:650px){.header{align-items:flex-start;padding:12px}.header-note{display:none}.brand{width:100%;flex-wrap:wrap}.brand-sub{font-size:10px}.suite-video-btn{margin-left:48px}.switcher{overflow-x:auto}.tool-tab{padding:11px 14px;font-size:9px;min-width:225px}.stage{min-height:0}}
@media print{.header,.switcher{display:none!important}.suite{display:block;height:auto}.stage{position:static}.tool-frame{position:static;height:100vh}}

.suite-video-btn{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 12px;border-radius:6px;font-size:10px;letter-spacing:1px;font-weight:800;cursor:pointer}.suite-video-btn:hover{background:var(--gold);color:#000}.suite-video-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.84);padding:20px;align-items:center;justify-content:center}.suite-video-modal.open{display:flex}.suite-video-box{width:min(900px,100%);background:#fff;border:1px solid var(--gold);border-radius:12px;overflow:hidden}.suite-video-head{display:flex;align-items:center;justify-content:space-between;background:#111;color:#fff;padding:13px 16px;border-bottom:2px solid var(--gold)}.suite-video-head h3{margin:0;font-family:Georgia,serif}.suite-video-close{border:0;background:transparent;color:var(--gold);font-size:28px;cursor:pointer}.suite-video-frame{position:relative;padding-top:56.25%;background:#000}.suite-video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}@media print{.suite-video-btn,.suite-video-modal{display:none!important}}

/* Mobile release refinements: presentation only */
@media(max-width:700px){
  html,body{overflow:hidden;width:100%;max-width:100%}
  .suite{grid-template-rows:auto auto minmax(0,1fr);height:100dvh}
  .header{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;padding:9px 10px;gap:8px}
  .brand{min-width:0;gap:8px}
  .mark{width:31px;height:31px;flex:0 0 31px;font-size:12px}
  .brand-name{font-size:9px;letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-sub{font-size:10px;line-height:1.2;white-space:normal}
  .suite-video-btn{margin:0;padding:8px 9px;font-size:9px;line-height:1.15;white-space:nowrap}
  .switcher{display:grid;grid-template-columns:1fr 1fr;overflow:visible}
  .tool-tab{min-width:0;width:100%;padding:10px 6px;font-size:8px;line-height:1.25;letter-spacing:.7px;white-space:normal;text-align:center}
  .stage{min-height:0;height:auto}
  .tool-frame{position:absolute;inset:0;width:100%;height:100%}
  .suite-video-modal{padding:8px}
  .suite-video-box{width:100%;max-height:96dvh}
  .suite-video-head{padding:10px 12px}
  .suite-video-head h3{font-size:16px;line-height:1.2}
}
@media(max-width:380px){
  .header{grid-template-columns:1fr}
  .suite-video-btn{width:100%}
}

</style>
</head>

function openSuiteVideo(){
  const m=document.getElementById('suiteVideoModal');
  const f=document.getElementById('suiteVideoFrame');
  if(!m||!f)return;
  f.src='https://www.youtube-nocookie.com/embed/9022tS0Hme0?rel=0';
  m.classList.add('open');
  m.setAttribute('aria-hidden','false');
}
function closeSuiteVideo(){
  const m=document.getElementById('suiteVideoModal');
  const f=document.getElementById('suiteVideoFrame');
  if(!m||!f)return;
  f.src='';
  m.classList.remove('open');
  m.setAttribute('aria-hidden','true');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSuiteVideo()});
function mountTool(name){
  const frame=document.getElementById('frame-'+name);
  if(!frame||frame.dataset.mounted==='1')return;
  frame.srcdoc=embeddedTools[name];
  frame.dataset.mounted='1';
}
function openTool(name){
  mountTool(name);
  ['maturity','scorecard'].forEach(key=>{
    const frame=document.getElementById('frame-'+key);
    const tab=document.getElementById('tab-'+key);
    if(frame)frame.classList.toggle('active',key===name);
    if(tab)tab.classList.toggle('active',key===name);
  });
  try{localStorage.setItem('hmh-suite-active-tool',name)}catch(e){}
}
function bootSuite(){
  let active='maturity';
  try{active=localStorage.getItem('hmh-suite-active-tool')||'maturity'}catch(e){}
  mountTool('maturity');
  openTool(active==='scorecard'?'scorecard':'maturity');
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bootSuite);else bootSuite();
</script>
