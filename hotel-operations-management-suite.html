<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Operations Management Suite — Hotel Mastery Hub</title>
<style>
:root{--gold:#B6960C;--black:#080808;--white:#fff;--paper:#f7f5ef;--line:#292929}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--black);color:var(--white);overflow:hidden}
.suite{height:100%;display:grid;grid-template-rows:auto auto 1fr}
.header{background:#000;border-bottom:3px solid var(--gold);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:35px;height:35px;border:2px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:Georgia,serif;font-weight:800}
.brand-name{font-size:11px;letter-spacing:3px;color:var(--gold);font-weight:800}
.brand-sub{font-size:12px;color:#ddd;margin-top:2px}
.header-note{font-size:11px;color:#aaa;text-align:right;max-width:390px}
.switcher{background:#111;display:flex;border-bottom:1px solid #303030;overflow-x:auto}
.tool-tab{appearance:none;border:0;border-right:1px solid #303030;background:#111;color:#bbb;padding:13px 22px;cursor:pointer;font-size:11px;letter-spacing:1.8px;font-weight:800;white-space:nowrap}
.tool-tab:hover{color:#fff;background:#181818}
.tool-tab.active{background:var(--gold);color:#000}
.stage{position:relative;min-height:0;background:var(--paper)}
.tool-frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--paper);display:none}
.tool-frame.active{display:block}
@media(max-width:650px){.header-note{display:none}.brand-sub{font-size:10px}.tool-tab{padding:11px 14px;font-size:9px}}
@media print{.header,.switcher{display:none!important}.suite{display:block;height:auto}.stage{position:static}.tool-frame{position:static;height:100vh}}
</style>
</head>
<body>
<div class="suite">
  <header class="header">
    <div class="brand"><div class="mark">HM</div><div><div class="brand-name">HOTEL MASTERY HUB</div><div class="brand-sub">Hotel Operations Management Suite</div></div></div>
    <div class="header-note">Two connected management tools in one self-contained HTML product. All hotel information remains in this browser unless exported.</div>
  </header>
  <nav class="switcher" aria-label="Choose a tool">
    <button class="tool-tab active" id="tab-maturity" onclick="openTool('maturity')">01 · MATURITY ASSESSMENT</button>
    <button class="tool-tab" id="tab-scorecard" onclick="openTool('scorecard')">02 · OPERATIONS SCORECARD</button>
  </nav>
  <main class="stage">
    <iframe class="tool-frame active" id="frame-maturity" title="Hotel Operations Maturity Assessment"></iframe>
    <iframe class="tool-frame" id="frame-scorecard" title="Hotel Operations Scorecard"></iframe>
  </main>
</div>
<script>
const embeddedTools = {
  maturity: "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Hotel Operations Maturity Assessment<\/title>\n<style>\n:root{--gold:#B6960C;--black:#0b0b0b;--white:#fff;--paper:#f7f5ef;--muted:#6c6c6c;--line:#ded8c5;--danger:#9d2a2a;--amber:#9a6810;--green:#276749;--shadow:0 16px 40px rgba(0,0,0,.10)}*{box-sizing:border-box}body{margin:0;font:15px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;color:var(--black);background:var(--paper)}button,input,select,textarea{font:inherit}.app{min-height:100vh}.topbar{position:sticky;top:0;z-index:20;background:var(--black);color:#fff;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:14px 22px;gap:16px}.brand{display:flex;align-items:center;gap:12px}.mark{width:36px;height:36px;border:2px solid var(--gold);display:grid;place-items:center;font-family:Georgia,serif;color:var(--gold);font-weight:800}.brand small{display:block;color:#cfcfcf}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--black);background:#fff;color:#111;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:700}.btn:hover{transform:translateY(-1px)}.btn.gold{background:var(--gold);border-color:var(--gold);color:#000}.btn.dark{background:#111;color:#fff;border-color:#333}.btn.ghost{background:transparent;color:#fff;border-color:#555}.btn.danger{color:var(--danger);border-color:#d6abab}.shell{display:grid;grid-template-columns:260px minmax(0,1fr);min-height:calc(100vh - 67px)}.side{background:#111;color:#fff;padding:22px 16px;border-right:1px solid #333}.side h3{margin:0 8px 12px;font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em}.nav{display:grid;gap:6px}.nav button{width:100%;text-align:left;background:transparent;color:#ddd;border:0;border-left:3px solid transparent;padding:11px 12px;cursor:pointer;border-radius:0 7px 7px 0}.nav button.active{background:#242015;border-left-color:var(--gold);color:#fff}.nav .done::after{content:'\u2713';float:right;color:var(--gold)}.side-note{margin:24px 8px 0;color:#aaa;font-size:12px}.main{padding:28px;max-width:1450px;width:100%;margin:auto}.screen{display:none}.screen.active{display:block}.hero{background:linear-gradient(135deg,#111 0%,#1d1a10 100%);color:#fff;border-radius:16px;padding:42px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:'';position:absolute;width:230px;height:230px;border:34px solid rgba(182,150,12,.14);border-radius:50%;right:-70px;top:-90px}.eyebrow{color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:.14em;font-size:12px}.hero h1{font-family:Georgia,serif;font-size:46px;line-height:1.05;margin:12px 0 16px;max-width:850px}.hero p{max-width:760px;color:#d4d4d4;font-size:17px}.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}.grid{display:grid;gap:18px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 8px 26px rgba(0,0,0,.05)}.card h2,.card h3{margin-top:0}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px}.section-head h1{font-family:Georgia,serif;font-size:34px;margin:0}.section-head p{margin:5px 0 0;color:var(--muted)}.progress-wrap{min-width:220px}.progress{height:9px;background:#e8e3d4;border-radius:20px;overflow:hidden}.progress>i{display:block;height:100%;background:var(--gold);width:0}.muted{color:var(--muted)}.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.field label{display:block;font-weight:800;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;padding:11px;border:1px solid #cfc8b4;border-radius:8px;background:#fff}.field textarea{min-height:90px}.span2{grid-column:span 2}.span3{grid-column:span 3}.q-card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:18px;margin-bottom:14px}.q-top{display:flex;justify-content:space-between;gap:16px}.q-title{font-weight:800;font-size:16px}.badge{display:inline-block;border:1px solid #c9b86d;background:#fff9de;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}.scale{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px;margin-top:14px}.scale label{border:1px solid #d8d1be;border-radius:8px;padding:9px 7px;text-align:center;cursor:pointer;font-size:12px;background:#fff}.scale input{display:none}.scale label:has(input:checked){background:#15130b;color:#fff;border-color:var(--gold);box-shadow:inset 0 0 0 2px var(--gold)}.evidence{display:grid;grid-template-columns:1fr 180px;gap:8px;margin-top:10px}.evidence input,.evidence select{padding:9px;border:1px solid #d7d0bd;border-radius:7px}.footer-nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px}.stat{background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);padding:18px;border-radius:12px}.stat .num{font-size:30px;font-weight:900}.levelbar{display:flex;height:18px;border-radius:20px;overflow:hidden;border:1px solid #d3ccb8}.levelbar span{flex:1}.levelbar span:nth-child(odd){background:#eee8d6}.levelbar span:nth-child(even){background:#d7c786}.levelbar i{position:absolute}.score-ring{--p:0;width:150px;height:150px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--gold) calc(var(--p)*1%),#e8e3d4 0);position:relative}.score-ring:before{content:'';position:absolute;inset:13px;background:#fff;border-radius:50%}.score-ring strong{position:relative;font-size:33px}.result-hero{display:flex;align-items:center;gap:28px}.bars{display:grid;gap:10px}.bar-row{display:grid;grid-template-columns:240px 1fr 55px;gap:10px;align-items:center}.bar{height:13px;background:#e6e1d2;border-radius:20px;overflow:hidden}.bar i{display:block;height:100%;background:var(--gold)}.radar{width:100%;max-width:470px;aspect-ratio:1}.priority{border-left:5px solid var(--gold)}.priority.immediate{border-left-color:var(--danger)}.priority.high{border-left-color:var(--amber)}.roadmap{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.phase{background:#fff;border:1px solid var(--line);border-top:5px solid var(--gold);border-radius:12px;padding:16px}.phase ul{padding-left:18px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{border-bottom:1px solid #e4decd;padding:10px;text-align:left}.table th{background:#171717;color:#fff}.disclaimer{font-size:12px;color:#666;border-top:1px solid #ccc;padding-top:12px}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;border-left:4px solid var(--gold);padding:12px 16px;border-radius:8px;display:none;z-index:50}.search{padding:10px;border:1px solid #cfc8b4;border-radius:8px;width:280px}@media(max-width:1050px){.shell{grid-template-columns:1fr}.side{position:static}.nav{grid-template-columns:repeat(4,minmax(0,1fr))}.side h3,.side-note{display:none}.grid.four,.roadmap{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:repeat(2,1fr)}.span3{grid-column:span 2}}@media(max-width:700px){.topbar{align-items:flex-start}.shell{display:block}.nav{grid-template-columns:repeat(2,1fr)}.main{padding:16px}.hero{padding:28px}.hero h1{font-size:35px}.grid.two,.grid.three,.grid.four,.roadmap,.form-grid{grid-template-columns:1fr}.span2,.span3{grid-column:auto}.scale{grid-template-columns:repeat(2,1fr)}.evidence{grid-template-columns:1fr}.bar-row{grid-template-columns:130px 1fr 45px}.result-hero{align-items:flex-start;flex-direction:column}}@media print{body{background:#fff}.topbar,.side,.no-print,.footer-nav{display:none!important}.shell{display:block}.main{padding:0;max-width:none}.screen{display:none!important}.screen#print-report{display:block!important}.card,.stat,.phase{box-shadow:none;break-inside:avoid}.page-break{break-before:page}.table th{background:#eee!important;color:#000!important}.print-cover{height:92vh;display:flex;flex-direction:column;justify-content:center;border-bottom:6px solid var(--gold)}}\n<\/style><\/head><body><div class=\"app\">\n<header class=\"topbar\"><div class=\"brand\"><div class=\"mark\">HM<\/div><div><strong>Hotel Mastery Hub<\/strong><small>Operations Maturity Assessment<\/small><\/div><\/div><div class=\"toolbar\"><span id=\"saveStatus\" style=\"color:#bbb\">Saved locally<\/span><button class=\"btn ghost\" onclick=\"exportJSON()\">Backup<\/button><label class=\"btn ghost\">Restore<input hidden type=\"file\" accept=\"application/json\" onchange=\"importJSON(event)\"><\/label><button class=\"btn gold\" onclick=\"showResults()\">View Results<\/button><\/div><\/header>\n<div class=\"shell\"><aside class=\"side\"><h3>Assessment<\/h3><div class=\"nav\" id=\"nav\"><\/div><p class=\"side-note\">Your information remains in this browser unless you export a backup.<\/p><\/aside><main class=\"main\">\n<section id=\"welcome\" class=\"screen active\"><div class=\"hero\"><div class=\"eyebrow\">Professional operational diagnostic<\/div><h1>Build a hotel operation that is organised, measurable and easier to improve.<\/h1><p>Evaluate eight operating systems, identify priority gaps, and turn findings into a practical 90-day roadmap.<\/p><div class=\"hero-actions\"><button class=\"btn gold\" onclick=\"go('profile')\">Start assessment<\/button><button class=\"btn dark\" onclick=\"loadLatest()\">Continue saved assessment<\/button><\/div><\/div><div class=\"grid three\" style=\"margin-top:18px\"><div class=\"card\"><h3>Assess capability<\/h3><p class=\"muted\">Review whether systems are informal, defined, controlled or continuously improving.<\/p><\/div><div class=\"card\"><h3>Prioritise action<\/h3><p class=\"muted\">Critical operational gaps are ranked by severity, risk and guest impact.<\/p><\/div><div class=\"card\"><h3>Track progress<\/h3><p class=\"muted\">Save historical assessments and compare score movement over time.<\/p><\/div><\/div><\/section>\n<section id=\"profile\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Step 1<\/div><h1>Hotel profile<\/h1><p>Used in the report and historical comparison.<\/p><\/div><\/div><div class=\"card\"><div class=\"form-grid\" id=\"profileFields\"><\/div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('welcome')\">Back<\/button><button class=\"btn gold\" onclick=\"saveProfile();go('instructions')\">Continue<\/button><\/div><\/div><\/section>\n<section id=\"instructions\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Step 2<\/div><h1>How to complete the assessment<\/h1><\/div><\/div><div class=\"grid two\"><div class=\"card\"><h3>Use the maturity scale<\/h3><ol><li><b>0 \u2014 Not in place<\/b><\/li><li><b>1 \u2014 Informal<\/b><\/li><li><b>2 \u2014 Partially implemented<\/b><\/li><li><b>3 \u2014 Defined and used<\/b><\/li><li><b>4 \u2014 Measured and reviewed<\/b><\/li><\/ol><p class=\"muted\">\u201cUnsure\u201d scores conservatively and is flagged for verification. \u201cNot applicable\u201d is excluded from scoring.<\/p><\/div><div class=\"card\"><h3>Add evidence where useful<\/h3><p>Reference an SOP, checklist, review date, staff role, observation or improvement idea. Evidence improves assessment confidence.<\/p><p><span class=\"badge\">Documented<\/span> <span class=\"badge\">Observed<\/span> <span class=\"badge\">Reported<\/span> <span class=\"badge\">Not verified<\/span><\/p><\/div><\/div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('profile')\">Back<\/button><button class=\"btn gold\" onclick=\"go(categories[0].id)\">Begin assessment<\/button><\/div><\/section>\n<div id=\"categoryScreens\"><\/div>\n<section id=\"review\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Review<\/div><h1>Unanswered and uncertain items<\/h1><p>Resolve these where practical before finalising results.<\/p><\/div><\/div><div id=\"reviewList\"><\/div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go(categories[categories.length-1].id)\">Back<\/button><button class=\"btn gold\" onclick=\"showResults()\">Calculate results<\/button><\/div><\/section>\n<section id=\"results\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Assessment results<\/div><h1 id=\"resultHotel\">Hotel Operations Maturity<\/h1><p id=\"resultMeta\"><\/p><\/div><div class=\"toolbar no-print\"><button class=\"btn\" onclick=\"window.print()\">Print / Save PDF<\/button><button class=\"btn\" onclick=\"exportCSV()\">Export CSV<\/button><button class=\"btn gold\" onclick=\"finalizeAssessment()\">Save snapshot<\/button><\/div><\/div><div id=\"resultsContent\"><\/div><\/section>\n<section id=\"history\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Progress<\/div><h1>Historical comparison<\/h1><\/div><\/div><div id=\"historyContent\"><\/div><\/section>\n<section id=\"print-report\" class=\"screen\"><\/section>\n<\/main><\/div><\/div><div id=\"toast\" class=\"toast\"><\/div>\n<script>\nconst KEY='hmh_maturity_v1', SHARED='hmh_hotel_profile_v1';\nconst categoryMeta=[\n['daily','Daily Operations and Ownership','Mapping the Perfect Day',['Guest Journey Mapper','Hour-by-Hour Planner','Shift Planner','Room File']],\n['quality','Checklists and Quality Control','Checklists That Actually Work',['Checklist Builder','Inspection Tools','Audit Tools']],\n['housekeeping','Housekeeping and Cleaning Systems','Cleaning as a System, Not a Stress',['Housekeeping Shift Planner','Productivity Tracker','Cleaning Checklist','Room Inspection Tool']],\n['frontdesk','Guest Journey and Front Desk','Check-In & Check-Out: The Moments That Matter',['Guest Journey Mapper','Script Builder','Receptionist Onboarding','Guest Screening Tool']],\n['maintenance','Maintenance and Asset Protection','Preventing Maintenance Issues',['Maintenance Issue Log','Urgency Triage','Escalation Contact Card','Maintenance Audit']],\n['sops','SOPs, Decision Guidance and Documentation','Your Operations Manual',['SOP Builder','Decision Guidance Builder','Review Scheduler','Operations Manual Builder']],\n['training','Staff Onboarding and Training','Your Operations Manual',['Receptionist Onboarding','Housekeeper Onboarding','SOP Builder','Decision Guidance Builder']],\n['kpis','SLAs, KPIs and Management Review','Service Level Agreements and KPIs',['KPI/SLA Dashboard','Team KPI Tool','Review Scheduler','Operations Scorecard']]\n];\nconst questionSets={\ndaily:['Is the full hotel day mapped from early morning to night?','Are daily operational blocks clearly identified?','Does each recurring task have one accountable owner?','Are shift handovers structured and recorded?','Are daily priorities visible to the team?','Are deadlines and timing windows defined?','Are recurring bottlenecks documented and reviewed?','Is responsibility clear when managers are absent?'],\nquality:['Are checklists used for recurring duties?','Are quality standards defined separately from task completion?','Does every checklist have an owner?','Does every checklist have a deadline or frequency?','Is the definition of \u201cdone\u201d observable?','Are completed checklists reviewed?','Are outdated checklists revised?','Are repeated omissions analysed and corrected?'],\nhousekeeping:['Is daily room workload calculated?','Are arrivals, departures and stayovers separated?','Is realistic cleaning capacity calculated?','Are room priorities assigned before work begins?','Is there a documented housekeeping shift plan?','Is cleaning quality inspected consistently?','Are linen and amenity requirements controlled?','Is housekeeping productivity monitored?','Are delays escalated before check-in time?','Is housekeeper onboarding structured and signed off?'],\nfrontdesk:['Is the complete guest journey mapped?','Are pre-arrival communications standardised?','Is guest information verified consistently?','Is the check-in process structured and controlled?','Are guest expectations clearly communicated?','Are scripts or communication guidelines available?','Is self-check-in controlled and monitored?','Are complaints and unusual requests escalated consistently?','Is check-out used to resolve problems and collect feedback?','Are guest communication standards reviewed?'],\nmaintenance:['Is there one central maintenance issue log?','Are maintenance issues assigned to an owner?','Is urgency classified consistently?','Are preventive checks scheduled?','Are high-risk assets identified?','Are supplier and emergency contacts available?','Are unresolved issues escalated?','Are repeat failures analysed?','Is room or asset maintenance history stored?','Are statutory and specialist inspections tracked separately?'],\nsops:['Are core operational processes documented?','Does each SOP have a purpose and owner?','Are roles and responsibilities clear?','Are exceptions and decision points documented?','Is escalation guidance included?','Are employees trained on current procedures?','Is there one controlled location for documentation?','Are documents dated and versioned?','Is there a review schedule?','Are staff questions used to improve documentation?'],\ntraining:['Is there role-specific onboarding?','Are new staff shown expected quality standards?','Are key procedures demonstrated?','Is learning confirmed or tested?','Are sign-offs recorded?','Are probation or follow-up reviews scheduled?','Is refresher training completed?','Can temporary staff access essential instructions?'],\nkpis:['Are service expectations defined?','Are SLAs measurable?','Is an owner assigned to each SLA?','Are only useful KPIs tracked?','Are metric definitions consistent?','Are targets property-specific?','Are results reviewed on a schedule?','Are missed targets investigated?','Are actions assigned after review?','Are trends compared over time?']};\nconst criticalWords=['owner','handover','check-in process','urgency','emergency','unresolved','controlled location','escalation','high-risk'];\nconst categories=categoryMeta.map(([id,name,lesson,tools])=>({id,name,lesson,tools,questions:questionSets[id].map((text,i)=>({id:id+'_'+(i+1),text,weight:criticalWords.some(w=>text.toLowerCase().includes(w))?2:(i%4===0?1.5:1),risk:i<3?'high':'medium'}))}));\nlet state=JSON.parse(localStorage.getItem(KEY)||'null')||{profile:{},responses:{},history:[],updated:null};\nconst fields=[['hotelName','Hotel name','text'],['propertyType','Property type','select',['Boutique hotel','Independent hotel','Hostel','Guesthouse','Serviced apartments','Aparthotel','Vacation rental operator','Other']],['country','Country','text'],['city','City','text'],['rooms','Number of rooms','number'],['beds','Number of beds (optional)','number'],['employees','Number of employees','number'],['operatingModel','Operating model','select',['Independent','Group-managed','Owner-operated','Third-party managed']],['serviceModel','Service model','select',['Full service','Limited service','Self-service / hybrid']],['receptionModel','Reception model','select',['24-hour','Limited hours','Remote / self check-in','Hybrid']],['assessmentDate','Assessment date','date'],['assessor','Assessor','text'],['role','Role','text'],['purpose','Assessment purpose','select',['Baseline assessment','Course start','Course completion','Quarterly review','Improvement project','Consultant review','Other']]];\nfunction esc(s=''){return String(s).replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',\"'\":'&#39;','\"':'&quot;'}[c]))}\nfunction save(){state.updated=new Date().toISOString();localStorage.setItem(KEY,JSON.stringify(state));document.getElementById('saveStatus').textContent='Saved '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}\nfunction toast(t){let e=document.getElementById('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2200)}\nfunction init(){renderNav();renderProfile();renderCategories();if(!state.profile.assessmentDate)state.profile.assessmentDate=new Date().toISOString().slice(0,10);updateProgress();}\nfunction renderNav(){let items=[['welcome','Overview'],['profile','Hotel profile'],['instructions','Instructions'],...categories.map(c=>[c.id,c.name]),['review','Review'],['results','Results'],['history','History']];nav.innerHTML=items.map(([id,n])=>`<button data-screen=\"${id}\" onclick=\"go('${id}')\">${n}<\/button>`).join('');}\nfunction renderProfile(){profileFields.innerHTML=fields.map(([id,label,type,opts])=>`<div class=\"field ${id==='purpose'?'span2':''}\"><label>${label}<\/label>${type==='select'?`<select id=\"p_${id}\"><option value=\"\">Select\u2026<\/option>${opts.map(o=>`<option ${state.profile[id]===o?'selected':''}>${o}<\/option>`).join('')}<\/select>`:`<input id=\"p_${id}\" type=\"${type}\" value=\"${esc(state.profile[id]||'')}\">`}<\/div>`).join('');}\nfunction saveProfile(){fields.forEach(([id])=>state.profile[id]=document.getElementById('p_'+id).value);localStorage.setItem(SHARED,JSON.stringify(state.profile));save();}\nfunction renderCategories(){categoryScreens.innerHTML=categories.map((c,ci)=>`<section id=\"${c.id}\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Category ${String.fromCharCode(65+ci)}<\/div><h1>${c.name}<\/h1><p>Related lesson: ${c.lesson}<\/p><\/div><div class=\"progress-wrap\"><small>${ci+1} of ${categories.length}<\/small><div class=\"progress\"><i style=\"width:${(ci+1)/categories.length*100}%\"><\/i><\/div><\/div><\/div><div><input class=\"search no-print\" placeholder=\"Search questions\" oninput=\"filterQuestions('${c.id}',this.value)\"><\/div><div style=\"margin-top:14px\" id=\"qs_${c.id}\">${c.questions.map(q=>questionHTML(c,q)).join('')}<\/div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('${ci?categories[ci-1].id:'instructions'}')\">Back<\/button><button class=\"btn gold\" onclick=\"go('${ci<categories.length-1?categories[ci+1].id:'review'}')\">${ci<categories.length-1?'Next category':'Review answers'}<\/button><\/div><\/section>`).join('');}\nfunction questionHTML(c,q){let r=state.responses[q.id]||{};let options=[[0,'0 \u00b7 Not in place'],[1,'1 \u00b7 Informal'],[2,'2 \u00b7 Partial'],[3,'3 \u00b7 Defined'],[4,'4 \u00b7 Measured'],['unsure','Unsure'],['na','N/A']];return `<article class=\"q-card\" data-search=\"${esc(q.text.toLowerCase())}\"><div class=\"q-top\"><div class=\"q-title\">${esc(q.text)}<\/div><span class=\"badge\">${q.weight===2?'Critical':q.weight===1.5?'Important':'Standard'}<\/span><\/div><div class=\"scale\">${options.map(([v,l])=>`<label><input type=\"radio\" name=\"${q.id}\" value=\"${v}\" ${String(r.value)===String(v)?'checked':''} onchange=\"setResponse('${q.id}','${v}')\">${l}<\/label>`).join('')}<\/div><div class=\"evidence\"><input value=\"${esc(r.note||'')}\" placeholder=\"Evidence, note or improvement idea\" oninput=\"setNote('${q.id}',this.value)\"><select onchange=\"setEvidence('${q.id}',this.value)\"><option value=\"\">Evidence status<\/option>${['Documented','Observed','Reported by staff','Not verified'].map(x=>`<option ${r.evidence===x?'selected':''}>${x}<\/option>`).join('')}<\/select><\/div><\/article>`}\nfunction setResponse(id,v){state.responses[id]=state.responses[id]||{};state.responses[id].value=(v==='unsure'||v==='na')?v:Number(v);save();updateProgress();}\nfunction setNote(id,v){state.responses[id]=state.responses[id]||{};state.responses[id].note=v;save()}\nfunction setEvidence(id,v){state.responses[id]=state.responses[id]||{};state.responses[id].evidence=v;save()}\nfunction filterQuestions(id,v){document.querySelectorAll('#qs_'+id+' .q-card').forEach(x=>x.style.display=x.dataset.search.includes(v.toLowerCase())?'':'none')}\nfunction go(id){if(document.getElementById('profile').classList.contains('active'))saveProfile();document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));if(id==='review')renderReview();if(id==='history')renderHistory();scrollTo(0,0)}\nfunction updateProgress(){categories.forEach(c=>{let done=c.questions.every(q=>state.responses[q.id]&&state.responses[q.id].value!==undefined);let b=document.querySelector(`[data-screen=\"${c.id}\"]`);if(b)b.classList.toggle('done',done)})}\nfunction renderReview(){let items=[];categories.forEach(c=>c.questions.forEach(q=>{let r=state.responses[q.id];if(!r||r.value===undefined||r.value==='unsure')items.push({c,q,r})}));reviewList.innerHTML=items.length?items.map(x=>`<div class=\"card\" style=\"margin-bottom:10px\"><b>${x.c.name}<\/b><p>${x.q.text}<\/p><button class=\"btn\" onclick=\"go('${x.c.id}')\">Open category<\/button><\/div>`).join(''):`<div class=\"card\"><h3>Ready to calculate<\/h3><p>All questions have a selected response.<\/p><\/div>`}\nfunction calc(){let total=0,catCount=0,catResults=[],priorities=[],strengths=[],answered=0,unsure=0,na=0,evidence=0,totalQ=0;categories.forEach(c=>{let earn=0,possible=0;let local=[];c.questions.forEach(q=>{totalQ++;let r=state.responses[q.id]||{};if(r.note||r.evidence)evidence++;if(r.value==='na'){na++;return}possible+=q.weight*4;let val=r.value==='unsure'?1:(typeof r.value==='number'?r.value:0);if(r.value==='unsure')unsure++;if(r.value!==undefined)answered++;earn+=val*q.weight;local.push({q,r,val,gap:(4-val)*q.weight});if(val<=1)priorities.push({category:c,q,r,val,score:(4-val)*q.weight*(q.risk==='high'?2:1.4)});if(val===4)strengths.push({category:c,q})});let score=possible?earn/possible*100:0;catResults.push({category:c,score,local});total+=score;catCount++});let overall=catCount?total/catCount:0;let completion=answered/Math.max(1,totalQ-na);let confidencePts=completion*60+(1-unsure/Math.max(1,answered))*20+Math.min(1,evidence/Math.max(1,totalQ*.35))*20;let confidence=confidencePts>=80?'High':confidencePts>=55?'Medium':'Low';return{overall,catResults,priorities:priorities.sort((a,b)=>b.score-a.score),strengths,confidence,stats:{answered,unsure,na,evidence,totalQ}}}\nfunction level(s){return s<=20?'Reactive':s<=40?'Basic':s<=60?'Defined':s<=80?'Controlled':'Continuously Improving'}\nfunction priorityLabel(p){return p.q.weight===2&&p.val===0?'Immediate':p.score>=7?'High':p.score>=4?'Medium':'Improvement opportunity'}\nfunction recommendation(p){let v=p.val,c=p.category;if(v<=1)return `Create and assign a clear process for: ${p.q.text.replace(/\\?$/,'').toLowerCase()}.`;if(v===2)return `Improve consistency through ownership, review and evidence for this process.`;if(v===3)return `Add measurement, exception review and periodic improvement.`;return `Maintain this strength and review it periodically.`}\nfunction showResults(){saveProfile();let x=calc();let prev=state.history.at(-1);resultHotel.textContent=(state.profile.hotelName||'Hotel')+' \u2014 Maturity Assessment';resultMeta.textContent=`${state.profile.assessmentDate||''} \u00b7 ${state.profile.assessor||'Assessor not entered'} \u00b7 ${level(x.overall)}`;let delta=prev?x.overall-prev.overall:null;resultsContent.innerHTML=`<div class=\"grid four\"><div class=\"stat\"><div class=\"muted\">Overall maturity<\/div><div class=\"num\">${x.overall.toFixed(0)}%<\/div><b>${level(x.overall)}<\/b><\/div><div class=\"stat\"><div class=\"muted\">Confidence<\/div><div class=\"num\">${x.confidence}<\/div><b>${x.stats.answered}/${x.stats.totalQ-x.stats.na} answered<\/b><\/div><div class=\"stat\"><div class=\"muted\">Critical gaps<\/div><div class=\"num\">${x.priorities.filter(p=>p.q.weight===2&&p.val<=1).length}<\/div><b>Requires management review<\/b><\/div><div class=\"stat\"><div class=\"muted\">Change<\/div><div class=\"num\">${delta===null?'\u2014':(delta>=0?'+':'')+delta.toFixed(0)+' pts'}<\/div><b>${prev?'Since last saved assessment':'No previous snapshot'}<\/b><\/div><\/div><div class=\"grid two\" style=\"margin-top:18px\"><div class=\"card result-hero\"><div class=\"score-ring\" style=\"--p:${x.overall}\"><strong>${x.overall.toFixed(0)}%<\/strong><\/div><div><div class=\"eyebrow\">Current maturity level<\/div><h2>${level(x.overall)}<\/h2><p>${levelDescription(x.overall)}<\/p><\/div><\/div><div class=\"card\"><h3>Category radar<\/h3>${radarSVG(x.catResults)}<\/div><\/div><div class=\"card\" style=\"margin-top:18px\"><h2>Category scores<\/h2><div class=\"bars\">${x.catResults.map(r=>`<div class=\"bar-row\"><span>${r.category.name}<\/span><div class=\"bar\"><i style=\"width:${r.score}%\"><\/i><\/div><b>${r.score.toFixed(0)}%<\/b><\/div>`).join('')}<\/div><\/div><div class=\"section-head\" style=\"margin-top:28px\"><div><h1>Top priorities<\/h1><p>Ranked by gap severity, weight and risk.<\/p><\/div><\/div><div class=\"grid two\">${x.priorities.slice(0,5).map(p=>`<div class=\"card priority ${priorityLabel(p).toLowerCase()}\"><span class=\"badge\">${priorityLabel(p)}<\/span><h3>${p.q.text}<\/h3><p><b>Operational recommendation:<\/b> ${recommendation(p)}<\/p><p class=\"muted\"><b>Related learning:<\/b> ${p.category.lesson}<br><b>Included tool:<\/b> ${p.category.tools[0]}<\/p><\/div>`).join('')||'<div class=\"card\"><h3>No priority gaps identified<\/h3><\/div>'}<\/div><div class=\"section-head\" style=\"margin-top:28px\"><div><h1>90-day roadmap<\/h1><\/div><\/div>${roadmapHTML(x)}<div class=\"section-head\" style=\"margin-top:28px\"><div><h1>Strengths<\/h1><\/div><\/div><div class=\"card\">${x.strengths.length?'<ul>'+x.strengths.slice(0,10).map(s=>`<li>${s.q.text} <span class=\"muted\">\u2014 ${s.category.name}<\/span><\/li>`).join('')+'<\/ul>':'<p>No items are currently scored at level 4. This is normal for an early baseline assessment.<\/p>'}<\/div>`;buildPrint(x);go('results')}\nfunction levelDescription(s){return s<=20?'The operation depends heavily on individual effort and immediate problem-solving.':s<=40?'Some systems exist, but implementation and ownership are inconsistent.':s<=60?'Core processes are documented, assigned and generally followed.':s<=80?'Processes are measured, reviewed and actively managed.':'Data, feedback and structured review are used to improve the operation proactively.'}\nfunction radarSVG(rs){let n=rs.length,cx=180,cy=180,R=130;let pts=rs.map((r,i)=>{let a=-Math.PI/2+i*2*Math.PI/n,rr=R*r.score/100;return[cx+Math.cos(a)*rr,cy+Math.sin(a)*rr]});let grid=[.2,.4,.6,.8,1].map(k=>`<polygon points=\"${rs.map((_,i)=>{let a=-Math.PI/2+i*2*Math.PI/n;return`${cx+Math.cos(a)*R*k},${cy+Math.sin(a)*R*k}`}).join(' ')}\" fill=\"none\" stroke=\"#d9d2bd\"/>`).join('');let axes=rs.map((r,i)=>{let a=-Math.PI/2+i*2*Math.PI/n;let x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;let lx=cx+Math.cos(a)*(R+28),ly=cy+Math.sin(a)*(R+28);return`<line x1=\"${cx}\" y1=\"${cy}\" x2=\"${x}\" y2=\"${y}\" stroke=\"#ddd\"/><text x=\"${lx}\" y=\"${ly}\" text-anchor=\"middle\" font-size=\"9\">${r.category.name.split(' ')[0]}<\/text>`}).join('');return`<svg class=\"radar\" viewBox=\"0 0 360 360\">${grid}${axes}<polygon points=\"${pts.map(p=>p.join(',')).join(' ')}\" fill=\"rgba(182,150,12,.28)\" stroke=\"#B6960C\" stroke-width=\"3\"/><\/svg>`}\nfunction roadmapHTML(x){let p=x.priorities.slice(0,12);let phases=[['First 7 days',p.slice(0,3)],['Days 8\u201330',p.slice(3,6)],['Days 31\u201360',p.slice(6,9)],['Days 61\u201390',p.slice(9,12)]];return`<div class=\"roadmap\">${phases.map(([name,items])=>`<div class=\"phase\"><h3>${name}<\/h3>${items.length?`<ul>${items.map(i=>`<li>${recommendation(i)}<\/li>`).join('')}<\/ul>`:'<p class=\"muted\">Maintain progress and review completed actions.<\/p>'}<\/div>`).join('')}<\/div>`}\nfunction finalizeAssessment(){let x=calc();state.history.push({id:crypto.randomUUID(),date:state.profile.assessmentDate||new Date().toISOString().slice(0,10),hotel:state.profile.hotelName||'Hotel',overall:x.overall,categories:Object.fromEntries(x.catResults.map(r=>[r.category.id,r.score])),critical:x.priorities.filter(p=>p.q.weight===2&&p.val<=1).length});save();toast('Assessment snapshot saved');renderHistory()}\nfunction renderHistory(){let h=[...state.history].reverse();historyContent.innerHTML=h.length?`<div class=\"card table-wrap\"><table class=\"table\"><thead><tr><th>Date<\/th><th>Hotel<\/th><th>Overall<\/th><th>Level<\/th><th>Critical gaps<\/th><\/tr><\/thead><tbody>${h.map(r=>`<tr><td>${r.date}<\/td><td>${esc(r.hotel)}<\/td><td>${r.overall.toFixed(0)}%<\/td><td>${level(r.overall)}<\/td><td>${r.critical}<\/td><\/tr>`).join('')}<\/tbody><\/table><\/div>`:`<div class=\"card\"><h3>No saved snapshots yet<\/h3><p>Save a snapshot from the results screen to begin comparison.<\/p><\/div>`}\nfunction exportJSON(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'hotel-maturity-backup.json')}\nfunction importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(!d.responses||!d.profile)throw 0;state=d;save();location.reload()}catch{alert('This file is not a valid maturity assessment backup.')}};r.readAsText(f)}\nfunction exportCSV(){let rows=[['Category','Question','Weight','Response','Note','Evidence']];categories.forEach(c=>c.questions.forEach(q=>{let r=state.responses[q.id]||{};rows.push([c.name,q.text,q.weight,r.value??'',r.note||'',r.evidence||''])}));let csv=rows.map(r=>r.map(x=>'\"'+String(x).replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n');download(new Blob([csv],{type:'text/csv'}),'hotel-maturity-answers.csv')}\nfunction download(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}\nfunction loadLatest(){let shared=JSON.parse(localStorage.getItem(SHARED)||'null');if(shared&&!state.profile.hotelName){state.profile=shared;save();renderProfile()}go(state.updated?'profile':'profile')}\nfunction buildPrint(x){printReport.innerHTML=`<div class=\"print-cover\"><div class=\"eyebrow\">Hotel Mastery Hub<\/div><h1 style=\"font-family:Georgia,serif;font-size:50px\">Hotel Operations<br>Maturity Assessment<\/h1><h2>${esc(state.profile.hotelName||'Hotel')}<\/h2><p>${state.profile.assessmentDate||''} \u00b7 ${esc(state.profile.assessor||'')}<\/p><\/div><div class=\"page-break\"><h1>Executive summary<\/h1><div class=\"grid three\"><div class=\"stat\"><div class=\"num\">${x.overall.toFixed(0)}%<\/div><b>${level(x.overall)}<\/b><\/div><div class=\"stat\"><div class=\"num\">${x.confidence}<\/div><b>Confidence<\/b><\/div><div class=\"stat\"><div class=\"num\">${x.priorities.filter(p=>p.q.weight===2&&p.val<=1).length}<\/div><b>Critical gaps<\/b><\/div><\/div><h2>Category results<\/h2><div class=\"bars\">${x.catResults.map(r=>`<div class=\"bar-row\"><span>${r.category.name}<\/span><div class=\"bar\"><i style=\"width:${r.score}%\"><\/i><\/div><b>${r.score.toFixed(0)}%<\/b><\/div>`).join('')}<\/div><h2>Top priorities<\/h2>${x.priorities.slice(0,5).map(p=>`<div class=\"card priority\"><b>${priorityLabel(p)} \u2014 ${p.q.text}<\/b><p>${recommendation(p)}<\/p><\/div>`).join('')}<h2>90-day roadmap<\/h2>${roadmapHTML(x)}<p class=\"disclaimer\">This tool provides a structured operational self-assessment based on information entered by the user. It is not a certification, audit, legal opinion, safety inspection or regulatory-compliance assessment. Hotels remain responsible for complying with local laws, licensing requirements, employment rules, safety standards and technical inspection obligations.<\/p><\/div>`}\ninit();\n<\/script><\/body><\/html>\n",
  scorecard: "<!doctype html><html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>Hotel Operations Scorecard<\/title>\n<style>\n:root{--gold:#B6960C;--black:#0b0b0b;--paper:#f7f5ef;--white:#fff;--line:#ded8c5;--muted:#6b6b6b;--green:#286448;--amber:#946715;--red:#9a2c2c;--blue:#315f88}*{box-sizing:border-box}body{margin:0;font:15px/1.5 Inter,system-ui,Arial;color:#111;background:var(--paper)}button,input,select,textarea{font:inherit}.top{background:#0b0b0b;color:#fff;border-bottom:3px solid var(--gold);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;gap:15px;position:sticky;top:0;z-index:10}.brand{display:flex;align-items:center;gap:11px}.mark{width:36px;height:36px;border:2px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-family:Georgia,serif;font-weight:900}.brand small{display:block;color:#bbb}.tools{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:9px 13px;border-radius:8px;border:1px solid #222;background:#fff;font-weight:800;cursor:pointer}.btn.gold{background:var(--gold);border-color:var(--gold)}.btn.dark{background:#161616;color:#fff;border-color:#444}.layout{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 67px)}aside{background:#121212;color:#fff;padding:22px 14px}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;color:#ddd;padding:11px;text-align:left;border-left:3px solid transparent;cursor:pointer}.nav button.active{background:#252116;border-left-color:var(--gold);color:#fff}.main{padding:28px;max-width:1500px;width:100%;margin:auto}.screen{display:none}.screen.active{display:block}.hero{background:linear-gradient(135deg,#111,#211d10);color:#fff;padding:42px;border-radius:16px;overflow:hidden;position:relative}.hero h1{font:46px/1.05 Georgia,serif;margin:10px 0}.hero p{color:#d5d5d5;font-size:17px;max-width:780px}.eyebrow{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:19px;box-shadow:0 8px 24px rgba(0,0,0,.05)}.grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:18px}.section-head h1{font:35px Georgia,serif;margin:0}.section-head p,.muted{color:var(--muted)}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field label{font-weight:800;display:block;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #cec7b4;padding:10px;border-radius:7px}.stat{background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);padding:17px;border-radius:11px}.stat .num{font-size:30px;font-weight:900}.status{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:4px 9px;font-size:11px;font-weight:900;text-transform:uppercase}.status:before{content:'';width:8px;height:8px;border-radius:50%;background:currentColor}.on-target{color:var(--green);background:#e9f5ef}.warning{color:var(--amber);background:#fff4d9}.critical{color:var(--red);background:#fdeaea}.no-data{color:#666;background:#eee}.metric{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:16px;margin-bottom:11px}.metric-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.metric-grid{display:grid;grid-template-columns:120px 120px 110px 110px 1fr;gap:8px;margin-top:12px;align-items:end}.metric-grid label{font-size:11px;text-transform:uppercase;font-weight:900;color:#666}.metric-grid input,.metric-grid select{width:100%;padding:9px;border:1px solid #d4cdbb;border-radius:7px}.switch{display:inline-flex;align-items:center;gap:6px}.bar-row{display:grid;grid-template-columns:220px 1fr 50px 95px;gap:10px;align-items:center;margin-bottom:10px}.bar{height:13px;background:#e9e4d7;border-radius:20px;overflow:hidden}.bar i{display:block;height:100%;background:var(--gold)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{padding:10px;border-bottom:1px solid #e5dfcf;text-align:left}.table th{background:#161616;color:#fff}.action{border-left:5px solid var(--gold)}.action.overdue{border-left-color:var(--red)}.trend{width:100%;height:260px}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;border-left:4px solid var(--gold);padding:12px 16px;border-radius:8px;display:none}.footer-nav{display:flex;justify-content:space-between;gap:8px;margin-top:18px}@media(max-width:1050px){.layout{grid-template-columns:1fr}aside{padding:10px}.nav{grid-template-columns:repeat(4,1fr)}.grid.four{grid-template-columns:repeat(2,1fr)}.metric-grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:700px){.main{padding:15px}.nav{grid-template-columns:repeat(2,1fr)}.grid.two,.grid.three,.grid.four,.form-grid{grid-template-columns:1fr}.metric-grid{grid-template-columns:1fr 1fr}.bar-row{grid-template-columns:130px 1fr 42px}.bar-row .status{display:none}.hero{padding:28px}.hero h1{font-size:35px}}@media print{.top,aside,.no-print{display:none!important}.layout{display:block}.main{padding:0}.screen{display:none!important}#report{display:block!important}.card,.stat{box-shadow:none;break-inside:avoid}.table th{background:#eee!important;color:#000!important}.print-cover{height:92vh;display:flex;flex-direction:column;justify-content:center;border-bottom:6px solid var(--gold)}}\n<\/style><\/head><body><header class=\"top\"><div class=\"brand\"><div class=\"mark\">HM<\/div><div><strong>Hotel Mastery Hub<\/strong><small>Operations Scorecard<\/small><\/div><\/div><div class=\"tools\"><span id=\"saved\" style=\"color:#bbb\">Saved locally<\/span><button class=\"btn dark\" onclick=\"exportData()\">Backup<\/button><label class=\"btn dark\">Restore<input hidden type=\"file\" accept=\"application/json\" onchange=\"importData(event)\"><\/label><button class=\"btn gold\" onclick=\"showDashboard()\">Dashboard<\/button><\/div><\/header><div class=\"layout\"><aside><div class=\"nav\" id=\"nav\"><\/div><\/aside><main class=\"main\">\n<section id=\"welcome\" class=\"screen active\"><div class=\"hero\"><div class=\"eyebrow\">Weekly and monthly management control<\/div><h1>Turn operational numbers into management action.<\/h1><p>Track department performance, spot repeated misses, assign corrective actions and review whether standards are being achieved now.<\/p><div style=\"margin-top:24px\"><button class=\"btn gold\" onclick=\"go('profile')\">Set up scorecard<\/button><\/div><\/div><div class=\"grid three\" style=\"margin-top:16px\"><div class=\"card\"><h3>Measure performance<\/h3><p class=\"muted\">Use higher-is-better, lower-is-better, target range, binary and SLA metrics.<\/p><\/div><div class=\"card\"><h3>Review trends<\/h3><p class=\"muted\">Compare periods and identify recurring misses or sustained improvement.<\/p><\/div><div class=\"card\"><h3>Close the loop<\/h3><p class=\"muted\">Convert warnings and critical results into owned corrective actions.<\/p><\/div><\/div><\/section>\n<section id=\"profile\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Setup<\/div><h1>Hotel and reporting period<\/h1><\/div><\/div><div class=\"card\"><div class=\"form-grid\" id=\"profileFields\"><\/div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('welcome')\">Back<\/button><button class=\"btn gold\" onclick=\"saveProfile();go('metrics')\">Continue<\/button><\/div><\/div><\/section>\n<section id=\"metrics\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Metric entry<\/div><h1>Operational measures<\/h1><p>Disable metrics that are not relevant to this property.<\/p><\/div><button class=\"btn no-print\" onclick=\"resetActuals()\">Clear actuals<\/button><\/div><div id=\"metricGroups\"><\/div><div class=\"footer-nav\"><button class=\"btn\" onclick=\"go('profile')\">Back<\/button><button class=\"btn gold\" onclick=\"showDashboard()\">Calculate scorecard<\/button><\/div><\/section>\n<section id=\"dashboard\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Current period<\/div><h1 id=\"dashTitle\">Operations Scorecard<\/h1><p id=\"dashMeta\"><\/p><\/div><div class=\"tools no-print\"><button class=\"btn\" onclick=\"window.print()\">Print / Save PDF<\/button><button class=\"btn\" onclick=\"savePeriod()\">Save period<\/button><button class=\"btn gold\" onclick=\"go('actions')\">Review actions<\/button><\/div><\/div><div id=\"dashboardContent\"><\/div><\/section>\n<section id=\"actions\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Management review<\/div><h1>Corrective actions<\/h1><p>Create actions for warning and critical metrics.<\/p><\/div><button class=\"btn gold no-print\" onclick=\"newAction()\">New action<\/button><\/div><div id=\"actionForm\"><\/div><div id=\"actionsList\" style=\"margin-top:15px\"><\/div><\/section>\n<section id=\"history\" class=\"screen\"><div class=\"section-head\"><div><div class=\"eyebrow\">Trends<\/div><h1>Saved periods<\/h1><\/div><\/div><div id=\"historyContent\"><\/div><\/section>\n<section id=\"report\" class=\"screen\"><\/section><\/main><\/div><div id=\"toast\" class=\"toast\"><\/div>\n<script>\nconst KEY='hmh_scorecard_v1',SHARED='hmh_hotel_profile_v1';\nconst defs=[\n['guest','Guest Experience',[['guest_review','Guest review score','higher','/5',4.5,4.2,4],['complaint_rate','Complaint rate','lower','%',2,3,5],['complaint_sla','Complaint-resolution SLA','higher','%',95,90,80]]],\n['front','Front Desk',[['checkin_accuracy','Check-in accuracy','higher','%',99,97,94],['checkin_duration','Average check-in duration','lower','min',5,7,10],['handover','Shift handover completion','higher','%',100,95,85]]],\n['housekeeping','Housekeeping',[['rooms_ready','Rooms ready by target time','higher','%',95,90,80],['inspection_pass','Room inspection pass rate','higher','%',95,90,82],['cleaning_time','Average cleaning time','range','min',30,25,35],['reclean','Rooms returned for re-cleaning','lower','%',2,4,7]]],\n['maintenance','Maintenance',[['urgent_sla','Urgent issues resolved within SLA','higher','%',95,85,70],['overdue_issues','Open overdue issues','lower','count',0,2,5],['preventive','Preventive checks completed','higher','%',100,90,80],['repeat_defects','Repeat defects','lower','count',0,2,4]]],\n['people','People, Training and Documentation',[['onboarding','Onboarding completion','higher','%',100,90,75],['training','Training completion','higher','%',95,85,70],['sop_review','SOP review completion','higher','%',100,90,75]]],\n['management','Commercial and Management KPIs',[['occupancy','Occupancy','higher','%',75,65,50],['adr','ADR','higher','currency',120,105,90],['revpar','RevPAR','higher','currency',90,75,60],['labour_cost','Labour cost per occupied room','lower','currency',35,42,50],['sla_total','Overall SLA achievement','higher','%',95,88,75],['action_completion','Corrective-action completion','higher','%',90,75,60]]]\n].map(([id,name,ms])=>({id,name,metrics:ms.map((m,i)=>({id:m[0],name:m[1],type:m[2],unit:m[3],target:m[4],warning:m[5],critical:m[6],weight:(i===0||i===2)?2:1,enabled:true,owner:name+' Lead'}))}));\nlet state=JSON.parse(localStorage.getItem(KEY)||'null')||{profile:{},values:{},periods:[],actions:[]};\nconst pfields=[['hotelName','Hotel name','text'],['propertyType','Property type','text'],['periodType','Period type','select',['Weekly','Monthly','Custom']],['startDate','Period start','date'],['endDate','Period end','date'],['reviewer','Reviewed by','text'],['comments','Management comments','text']];\nfunction esc(s=''){return String(s).replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',\"'\":'&#39;','\"':'&quot;'}[c]))}\nfunction toast(t){let e=document.getElementById('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2200)}\nfunction save(){localStorage.setItem(KEY,JSON.stringify(state));saved.textContent='Saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}\nfunction init(){let shared=JSON.parse(localStorage.getItem(SHARED)||'null');if(shared&&!state.profile.hotelName)state.profile={...state.profile,...shared};if(!state.profile.startDate){let d=new Date();state.profile.endDate=d.toISOString().slice(0,10);d.setDate(d.getDate()-6);state.profile.startDate=d.toISOString().slice(0,10);state.profile.periodType='Weekly'};nav.innerHTML=[['welcome','Overview'],['profile','Hotel & period'],['metrics','Metric entry'],['dashboard','Dashboard'],['actions','Actions'],['history','History']].map(([id,n])=>`<button data-screen=\"${id}\" onclick=\"go('${id}')\">${n}<\/button>`).join('');renderProfile();renderMetrics();renderActions();renderHistory()}\nfunction go(id){if(document.getElementById('profile').classList.contains('active'))saveProfile();document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));if(id==='actions')renderActions();if(id==='history')renderHistory();scrollTo(0,0)}\nfunction renderProfile(){profileFields.innerHTML=pfields.map(([id,l,t,o])=>`<div class=\"field\"><label>${l}<\/label>${t==='select'?`<select id=\"p_${id}\">${o.map(x=>`<option ${state.profile[id]===x?'selected':''}>${x}<\/option>`).join('')}<\/select>`:`<input id=\"p_${id}\" type=\"${t}\" value=\"${esc(state.profile[id]||'')}\">`}<\/div>`).join('')}\nfunction saveProfile(){pfields.forEach(([id])=>state.profile[id]=document.getElementById('p_'+id).value);localStorage.setItem(SHARED,JSON.stringify(state.profile));save()}\nfunction allMetrics(){return defs.flatMap(d=>d.metrics.map(m=>({...m,department:d.id,departmentName:d.name}))) }\nfunction renderMetrics(){metricGroups.innerHTML=defs.map(d=>`<div class=\"card\" style=\"margin-bottom:16px\"><div class=\"section-head\"><div><h2>${d.name}<\/h2><\/div><\/div>${d.metrics.map(m=>metricHTML(d,m)).join('')}<\/div>`).join('')}\nfunction metricHTML(d,m){let v=state.values[m.id]||{};return`<div class=\"metric\"><div class=\"metric-head\"><div><b>${m.name}<\/b><div class=\"muted\">${typeName(m.type)} \u00b7 Owner: ${m.owner}<\/div><\/div><label class=\"switch\"><input type=\"checkbox\" ${v.enabled===false?'':'checked'} onchange=\"setMetric('${m.id}','enabled',this.checked)\"> Enabled<\/label><\/div><div class=\"metric-grid\"><div><label>Actual<\/label><input type=\"number\" step=\"any\" value=\"${v.actual??''}\" oninput=\"setMetric('${m.id}','actual',this.value)\"><\/div><div><label>Target<\/label><input type=\"number\" step=\"any\" value=\"${v.target??m.target}\" oninput=\"setMetric('${m.id}','target',this.value)\"><\/div>${m.type==='range'?`<div><label>Range min<\/label><input type=\"number\" step=\"any\" value=\"${v.min??m.warning}\" oninput=\"setMetric('${m.id}','min',this.value)\"><\/div><div><label>Range max<\/label><input type=\"number\" step=\"any\" value=\"${v.max??m.critical}\" oninput=\"setMetric('${m.id}','max',this.value)\"><\/div>`:`<div><label>Warning<\/label><input type=\"number\" step=\"any\" value=\"${v.warning??m.warning}\" oninput=\"setMetric('${m.id}','warning',this.value)\"><\/div><div><label>Critical<\/label><input type=\"number\" step=\"any\" value=\"${v.critical??m.critical}\" oninput=\"setMetric('${m.id}','critical',this.value)\"><\/div>`}<div><label>Note<\/label><input value=\"${esc(v.note||'')}\" oninput=\"setMetric('${m.id}','note',this.value)\" placeholder=\"Context or cause\"><\/div><\/div><\/div>`}\nfunction setMetric(id,k,v){state.values[id]=state.values[id]||{};state.values[id][k]=(k==='enabled'||k==='note')?v:(v===''?'':Number(v));save()}\nfunction typeName(t){return({higher:'Higher is better',lower:'Lower is better',range:'Target range',binary:'Binary completion',sla:'SLA compliance'})[t]||t}\nfunction metricScore(m){let v=state.values[m.id]||{};if(v.enabled===false)return null;let a=Number(v.actual);if(v.actual===''||v.actual===undefined||Number.isNaN(a))return null;let target=Number(v.target??m.target),score=0;if(m.type==='higher')score=target===0?100:a/target*100;if(m.type==='lower')score=a<=target?100:(target===0?Math.max(0,100-a*20):target/a*100);if(m.type==='range'){let min=Number(v.min??m.warning),max=Number(v.max??m.critical);score=(a>=min&&a<=max)?100:(a<min?Math.max(0,100-(min-a)/Math.max(1,min)*100):Math.max(0,100-(a-max)/Math.max(1,max)*100))}return Math.max(0,Math.min(100,score))}\nfunction statusFor(m,score){if(score===null)return['No data','no-data'];let v=state.values[m.id]||{},a=Number(v.actual),w=Number(v.warning??m.warning),c=Number(v.critical??m.critical);if(m.type==='higher'){if(a<c)return['Critical','critical'];if(a<w)return['Warning','warning'];return['On target','on-target']}if(m.type==='lower'){if(a>=c)return['Critical','critical'];if(a>w)return['Warning','warning'];return['On target','on-target']}if(score<60)return['Critical','critical'];if(score<85)return['Warning','warning'];return['On target','on-target']}\nfunction calc(){let departments=[],all=[];defs.forEach(d=>{let sum=0,w=0,metrics=d.metrics.map(m=>{let score=metricScore(m),status=statusFor(m,score);if(score!==null){sum+=score*m.weight;w+=m.weight}let x={...m,score,status,actual:state.values[m.id]?.actual};all.push(x);return x});departments.push({id:d.id,name:d.name,score:w?sum/w:null,metrics})});let valid=departments.filter(d=>d.score!==null);let overall=valid.length?valid.reduce((s,d)=>s+d.score,0)/valid.length:null;return{departments,all,overall}}\nfunction showDashboard(){saveProfile();let x=calc(),prev=state.periods.at(-1);dashTitle.textContent=(state.profile.hotelName||'Hotel')+' \u2014 Operations Scorecard';dashMeta.textContent=`${state.profile.startDate||''} to ${state.profile.endDate||''} \u00b7 ${state.profile.periodType||''}`;let critical=x.all.filter(m=>m.status[0]==='Critical').length,warnings=x.all.filter(m=>m.status[0]==='Warning').length,open=state.actions.filter(a=>!['Completed','Cancelled'].includes(a.status)).length;let best=[...x.departments].filter(d=>d.score!==null).sort((a,b)=>b.score-a.score)[0],weak=[...x.departments].filter(d=>d.score!==null).sort((a,b)=>a.score-b.score)[0];dashboardContent.innerHTML=`<div class=\"grid four\"><div class=\"stat\"><div class=\"muted\">Overall score<\/div><div class=\"num\">${x.overall===null?'\u2014':x.overall.toFixed(0)+'%'}<\/div><b>${interpret(x.overall)}<\/b><\/div><div class=\"stat\"><div class=\"muted\">Previous period<\/div><div class=\"num\">${prev&&x.overall!==null?(x.overall-prev.overall>=0?'+':'')+(x.overall-prev.overall).toFixed(0)+' pts':'\u2014'}<\/div><b>${prev?'Compared with '+prev.endDate:'No previous period'}<\/b><\/div><div class=\"stat\"><div class=\"muted\">Critical metrics<\/div><div class=\"num\">${critical}<\/div><b>${warnings} warnings<\/b><\/div><div class=\"stat\"><div class=\"muted\">Open actions<\/div><div class=\"num\">${open}<\/div><b>Across all periods<\/b><\/div><\/div><div class=\"grid two\" style=\"margin-top:16px\"><div class=\"card\"><h2>Department performance<\/h2>${x.departments.map(d=>`<div class=\"bar-row\"><span>${d.name}<\/span><div class=\"bar\"><i style=\"width:${d.score??0}%\"><\/i><\/div><b>${d.score===null?'\u2014':d.score.toFixed(0)+'%'}<\/b><span class=\"status ${d.score===null?'no-data':d.score>=90?'on-target':d.score>=60?'warning':'critical'}\">${d.score===null?'No data':interpret(d.score)}<\/span><\/div>`).join('')}<\/div><div class=\"card\"><h2>Management view<\/h2><p><b>Best-performing:<\/b> ${best?best.name+' ('+best.score.toFixed(0)+'%)':'No data'}<\/p><p><b>Weakest:<\/b> ${weak?weak.name+' ('+weak.score.toFixed(0)+'%)':'No data'}<\/p><p><b>Action focus:<\/b> ${critical?'Review critical metrics first and assign owners.':'Maintain controls and investigate any warning trends.'}<\/p><p class=\"muted\">A strong score reflects current performance, not necessarily operational maturity.<\/p><\/div><\/div><div class=\"section-head\" style=\"margin-top:25px\"><div><h1>Metric results<\/h1><\/div><\/div><div class=\"card table-wrap\"><table class=\"table\"><thead><tr><th>Department<\/th><th>Metric<\/th><th>Actual<\/th><th>Target<\/th><th>Score<\/th><th>Status<\/th><th><\/th><\/tr><\/thead><tbody>${x.departments.flatMap(d=>d.metrics.map(m=>`<tr><td>${d.name}<\/td><td>${m.name}<\/td><td>${m.actual??'\u2014'} ${m.actual!==undefined?m.unit:''}<\/td><td>${state.values[m.id]?.target??m.target} ${m.unit}<\/td><td>${m.score===null?'\u2014':m.score.toFixed(0)+'%'}<\/td><td><span class=\"status ${m.status[1]}\">${m.status[0]}<\/span><\/td><td>${['Warning','Critical'].includes(m.status[0])?`<button class=\"btn\" onclick=\"newAction('${m.id}')\">Create action<\/button>`:''}<\/td><\/tr>`)).join('')}<\/tbody><\/table><\/div>${patternHTML(x)}`;buildReport(x);go('dashboard')}\nfunction interpret(s){if(s===null)return'No data';return s>=90?'Strong control':s>=75?'Generally on track':s>=60?'Attention required':s>=40?'Significant gaps':'Immediate action'}\nfunction patternHTML(x){let bad=x.all.filter(m=>['Warning','Critical'].includes(m.status[0]));return`<div class=\"section-head\" style=\"margin-top:25px\"><div><h1>Review prompts<\/h1><p>Prompts support investigation; they are not automated conclusions.<\/p><\/div><\/div><div class=\"grid two\">${bad.slice(0,6).map(m=>`<div class=\"card\"><span class=\"status ${m.status[1]}\">${m.status[0]}<\/span><h3>${m.name}<\/h3><p>${rootPrompts(m.id)}<\/p><\/div>`).join('')||'<div class=\"card\"><h3>No warnings or critical results<\/h3><p>Review positive outliers and confirm targets remain appropriate.<\/p><\/div>'}<\/div>`}\nfunction rootPrompts(id){if(id==='rooms_ready'||id==='cleaning_time')return'Investigate staffing, late departures, room priorities, cleaning-time assumptions, maintenance delays, linen supply and inspection bottlenecks.';if(id.includes('sla')||id.includes('issue')||id.includes('defect'))return'Investigate urgency classification, delayed reporting, unclear ownership, supplier availability, parts and escalation contacts.';if(id.includes('checkin'))return'Investigate booking data, payment issues, room readiness, repeated manual steps, scripts and staffing.';return'Check workload, ownership, process adherence, target quality, training, data accuracy and unusual operating conditions.'}\nfunction savePeriod(){let x=calc();if(x.overall===null)return alert('Enter at least one metric actual before saving.');state.periods.push({id:crypto.randomUUID(),hotel:state.profile.hotelName||'Hotel',startDate:state.profile.startDate,endDate:state.profile.endDate,periodType:state.profile.periodType,overall:x.overall,departments:Object.fromEntries(x.departments.map(d=>[d.id,d.score])),values:structuredClone(state.values)});save();toast('Scorecard period saved');renderHistory()}\nfunction newAction(metricId=''){let m=allMetrics().find(x=>x.id===metricId),v=m?state.values[m.id]||{}:{};actionForm.innerHTML=`<div class=\"card\"><h2>${m?'Action for '+m.name:'New corrective action'}<\/h2><div class=\"form-grid\"><div class=\"field\"><label>Issue<\/label><input id=\"a_issue\" value=\"${esc(m?.name||'')}\"><\/div><div class=\"field\"><label>Actual result<\/label><input id=\"a_actual\" value=\"${esc(v.actual??'')}\"><\/div><div class=\"field\"><label>Target<\/label><input id=\"a_target\" value=\"${esc(v.target??m?.target??'')}\"><\/div><div class=\"field\"><label>Possible cause<\/label><input id=\"a_cause\"><\/div><div class=\"field\"><label>Immediate correction<\/label><input id=\"a_correction\"><\/div><div class=\"field\"><label>Root-cause action<\/label><input id=\"a_root\"><\/div><div class=\"field\"><label>Owner<\/label><input id=\"a_owner\" value=\"${esc(m?.owner||'')}\"><\/div><div class=\"field\"><label>Due date<\/label><input id=\"a_due\" type=\"date\"><\/div><div class=\"field\"><label>Status<\/label><select id=\"a_status\">${['Open','In progress','Blocked','Completed','Cancelled'].map(x=>`<option>${x}<\/option>`).join('')}<\/select><\/div><\/div><div style=\"margin-top:12px\"><button class=\"btn gold\" onclick=\"saveAction('${metricId}')\">Save action<\/button> <button class=\"btn\" onclick=\"actionForm.innerHTML=''\">Cancel<\/button><\/div><\/div>`;go('actions')}\nfunction saveAction(metricId){state.actions.push({id:crypto.randomUUID(),metricId,issue:a_issue.value,actual:a_actual.value,target:a_target.value,cause:a_cause.value,correction:a_correction.value,root:a_root.value,owner:a_owner.value,due:a_due.value,status:a_status.value,created:new Date().toISOString().slice(0,10),notes:''});save();actionForm.innerHTML='';renderActions();toast('Action saved')}\nfunction renderActions(){let today=new Date().toISOString().slice(0,10);actionsList.innerHTML=state.actions.length?state.actions.map(a=>`<div class=\"card action ${a.due&&a.due<today&&!['Completed','Cancelled'].includes(a.status)?'overdue':''}\" style=\"margin-bottom:12px\"><div class=\"metric-head\"><div><span class=\"status ${a.status==='Completed'?'on-target':a.status==='Blocked'?'critical':'warning'}\">${a.status}<\/span><h3>${esc(a.issue)}<\/h3><\/div><select onchange=\"updateAction('${a.id}',this.value)\">${['Open','In progress','Blocked','Completed','Cancelled'].map(s=>`<option ${a.status===s?'selected':''}>${s}<\/option>`).join('')}<\/select><\/div><p><b>Owner:<\/b> ${esc(a.owner||'Unassigned')} \u00b7 <b>Due:<\/b> ${a.due||'Not set'}<\/p><p><b>Immediate correction:<\/b> ${esc(a.correction||'\u2014')}<br><b>Root-cause action:<\/b> ${esc(a.root||'\u2014')}<\/p><\/div>`).join(''):`<div class=\"card\"><h3>No corrective actions yet<\/h3><p>Create actions from warning or critical metric results.<\/p><\/div>`}\nfunction updateAction(id,status){let a=state.actions.find(x=>x.id===id);a.status=status;save();renderActions()}\nfunction renderHistory(){let h=[...state.periods].reverse();historyContent.innerHTML=h.length?`<div class=\"card table-wrap\"><table class=\"table\"><thead><tr><th>Period<\/th><th>Hotel<\/th><th>Type<\/th><th>Overall<\/th><th>Interpretation<\/th><\/tr><\/thead><tbody>${h.map(p=>`<tr><td>${p.startDate} \u2014 ${p.endDate}<\/td><td>${esc(p.hotel)}<\/td><td>${p.periodType}<\/td><td>${p.overall.toFixed(0)}%<\/td><td>${interpret(p.overall)}<\/td><\/tr>`).join('')}<\/tbody><\/table><\/div>`:`<div class=\"card\"><h3>No saved periods<\/h3><p>Save a completed scorecard to begin trend comparison.<\/p><\/div>`}\nfunction resetActuals(){if(!confirm('Clear all current actual values?'))return;Object.values(state.values).forEach(v=>delete v.actual);save();renderMetrics()}\nfunction exportData(){download(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),'hotel-scorecard-backup.json')}\nfunction importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(!d.values||!d.profile)throw 0;state=d;save();location.reload()}catch{alert('This file is not a valid scorecard backup.')}};r.readAsText(f)}\nfunction download(b,n){let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}\nfunction buildReport(x){report.innerHTML=`<div class=\"print-cover\"><div class=\"eyebrow\">Hotel Mastery Hub<\/div><h1 style=\"font:50px Georgia,serif\">Hotel Operations<br>Scorecard<\/h1><h2>${esc(state.profile.hotelName||'Hotel')}<\/h2><p>${state.profile.startDate||''} to ${state.profile.endDate||''}<\/p><\/div><h1>Management summary<\/h1><div class=\"grid three\"><div class=\"stat\"><div class=\"num\">${x.overall===null?'\u2014':x.overall.toFixed(0)+'%'}<\/div><b>${interpret(x.overall)}<\/b><\/div><div class=\"stat\"><div class=\"num\">${x.all.filter(m=>m.status[0]==='Critical').length}<\/div><b>Critical metrics<\/b><\/div><div class=\"stat\"><div class=\"num\">${state.actions.filter(a=>!['Completed','Cancelled'].includes(a.status)).length}<\/div><b>Open actions<\/b><\/div><\/div><h2>Department results<\/h2>${x.departments.map(d=>`<div class=\"bar-row\"><span>${d.name}<\/span><div class=\"bar\"><i style=\"width:${d.score??0}%\"><\/i><\/div><b>${d.score===null?'\u2014':d.score.toFixed(0)+'%'}<\/b><\/div>`).join('')}<h2>Critical and warning metrics<\/h2>${x.all.filter(m=>['Warning','Critical'].includes(m.status[0])).map(m=>`<div class=\"card\"><b>${m.name}<\/b><p>Actual: ${m.actual??'\u2014'} ${m.unit} \u00b7 Score: ${m.score?.toFixed(0)??'\u2014'}% \u00b7 ${m.status[0]}<\/p><\/div>`).join('')||'<p>None.<\/p>'}<h2>Open actions<\/h2>${state.actions.filter(a=>!['Completed','Cancelled'].includes(a.status)).map(a=>`<div class=\"card\"><b>${esc(a.issue)}<\/b><p>Owner: ${esc(a.owner||'Unassigned')} \u00b7 Due: ${a.due||'Not set'} \u00b7 Status: ${a.status}<\/p><\/div>`).join('')||'<p>None.<\/p>'}<p style=\"font-size:12px;color:#666;border-top:1px solid #ccc;padding-top:12px\">Suggested indicators and targets are examples. Each property should define appropriate metrics, targets and service standards based on its operating model, local requirements and business objectives.<\/p>`}\ninit();\n<\/script><\/body><\/html>\n"
};
function mountTool(name){
  const frame=document.getElementById('frame-'+name);
  if(frame.dataset.mounted==='1') return;
  const doc=frame.contentWindow.document;
  doc.open(); doc.write(embeddedTools[name]); doc.close();
  frame.dataset.mounted='1';
}
function openTool(name){
  mountTool(name);
  ['maturity','scorecard'].forEach(key=>{
    document.getElementById('frame-'+key).classList.toggle('active',key===name);
    document.getElementById('tab-'+key).classList.toggle('active',key===name);
  });
  try{localStorage.setItem('hmh-suite-active-tool',name)}catch(e){}
}
window.addEventListener('load',()=>{
  let active='maturity';
  try{active=localStorage.getItem('hmh-suite-active-tool')||'maturity'}catch(e){}
  mountTool('maturity');
  openTool(active==='scorecard'?'scorecard':'maturity');
});
</script>
